<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vitesse — Global Treasury & Payments Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --dark-purple: #470A68;
    --purple: #831FBF;
    --vivid-purple: #B029FF;
    --light-purple: #CF7FFF;
    --pastel-purple: #B49EB5;
    --warm-orange: #F15B40;
    --light-orange: #FD9352;
    --blue-green: #003342;
    --off-white: #F5F5F5;
    --black: #0A0A0A;

    --bg-0: #FFFFFF;
    --bg-1: #F5F5F5;
    --ink: #0A0A0A;
    --ink-soft: #470A68;
    --line: rgba(10,10,10,0.10);
    --line-strong: rgba(71,10,104,0.22);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: none;
    color: var(--ink);
    font-family: 'Poppins', system-ui, -apple-system, sans-serif;
    font-weight: 300;
    letter-spacing: -0.01em;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    position: relative;
    width: 100%;
    min-height: 100vh;
    background: transparent;
    overflow: hidden;
  }

  /* Top nav */
  .topbar {
    position: relative;
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 48px;
  }
  .logo img { height: 28px; display: block; }
  .topbar-meta {
    display: flex;
    gap: 32px;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(10,10,10,0.55);
  }
  .topbar-meta .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--warm-orange);
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 0 12px var(--warm-orange);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  /* Hero */
  .hero {
    display: grid;
    grid-template-columns: minmax(360px, 1fr) minmax(560px, 1.4fr);
    gap: 32px;
    padding: 24px 48px 64px;
    align-items: center;
    min-height: calc(100vh - 88px);
    position: relative;
  }

  /* Globe canvas: full-bleed centered on the viewport. */
  .globe-bg {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: min(95vh, 95vw);
    aspect-ratio: 1 / 1;
    transform: translateX(-50%);
    z-index: 1;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .globe-bg #globe-canvas {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    pointer-events: auto;
    cursor: grab;
  }
  .globe-bg #globe-canvas:active { cursor: grabbing; }

  .hero-copy { max-width: 520px; padding: 12px 0; position: relative; z-index: 5; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--light-orange);
    margin-bottom: 28px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .eyebrow::before {
    content: ""; width: 32px; height: 1px; background: var(--light-orange); display: inline-block;
  }
  h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
    font-size: clamp(40px, 5.2vw, 76px);
    line-height: 0.98;
    letter-spacing: -0.035em;
    margin-bottom: 24px;
    color: var(--ink);
    text-wrap: balance;
  }
  h1 .accent { color: var(--warm-orange); font-weight: 700; font-style: italic; }
  h1 .soft { color: rgba(10,10,10,0.45); font-weight: 300; }

  .lede {
    font-size: 17px;
    line-height: 1.55;
    color: rgba(10,10,10,0.72);
    max-width: 460px;
    margin-bottom: 36px;
  }

  .stat-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line);
    border-top: 1px solid var(--line-strong);
    border-bottom: 1px solid var(--line-strong);
    margin-bottom: 28px;
  }
  .stat {
    background: rgba(245,245,245,0.6);
    padding: 18px 16px 16px;
  }
  .stat-num {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.04em;
    color: var(--dark-purple);
    line-height: 1;
    margin-bottom: 8px;
  }
  .stat-num em { color: var(--warm-orange); font-style: normal; }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: rgba(10,10,10,0.55);
  }

  .entity-toggle {
    display: flex;
    background: rgba(245,245,245,0.7);
    border: 1px solid var(--line-strong);
    padding: 4px;
    margin-bottom: 24px;
    width: fit-content;
  }
  .entity-toggle button {
    appearance: none;
    background: transparent;
    border: none;
    color: rgba(10,10,10,0.6);
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 18px;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .entity-toggle button .swatch {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .entity-toggle button[data-entity="uk"] .swatch { background: var(--vivid-purple); box-shadow: 0 0 10px rgba(176,41,255,0.6); }
  .entity-toggle button[data-entity="us"] .swatch { background: var(--warm-orange); box-shadow: 0 0 10px rgba(241,91,64,0.6); }
  .entity-toggle button[data-entity="all"] .swatch { background: var(--dark-purple); box-shadow: 0 0 10px rgba(71,10,104,0.4); }
  .entity-toggle button.active {
    background: var(--dark-purple);
    color: var(--off-white);
  }
  .entity-toggle button:hover:not(.active) { color: var(--ink); }

  .entity-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(10,10,10,0.5);
    line-height: 1.6;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .entity-meta b { color: var(--dark-purple); font-weight: 500; }

  /* Globe column — now just a positioning frame for HUD/legend overlays.
     The actual canvas lives in .globe-bg behind everything. */
  .globe-col {
    position: relative;
    height: min(82vh, 760px);
    aspect-ratio: 1 / 1;
    margin-left: auto;
    margin-right: 0;
    width: 100%;
    max-width: 760px;
    z-index: 3;
    pointer-events: none;
  }
  .globe-col > * { pointer-events: auto; }
  .globe-col .hex-deco { pointer-events: none; }

  /* Hexagon corner decorations */
  .hex-deco {
    position: absolute;
    pointer-events: none;
    opacity: 0.18;
    z-index: 1;
  }
  .hex-deco.tl { top: 0; left: 0; }
  .hex-deco.br { bottom: 0; right: 0; transform: rotate(180deg); }

  /* HUD overlay on globe */
  .hud {
    position: absolute;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(10,10,10,0.45);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    z-index: 2;
  }
  .hud.tl { top: 18px; left: 18px; }
  .hud.tr { top: 18px; right: 18px; text-align: right; }
  .hud.bl { bottom: 18px; left: 18px; }
  .hud.br { bottom: 18px; right: 18px; text-align: right; }
  .hud .key { color: var(--dark-purple); }
  .hud .row { line-height: 1.7; }
  .hud .crosshair {
    width: 12px; height: 12px;
    border-left: 1px solid rgba(10,10,10,0.4);
    border-top: 1px solid rgba(10,10,10,0.4);
    position: absolute;
  }
  .hud.tl .crosshair { top: 0; left: 0; }

  /* Hub tooltip — `position: fixed` so we can place it with raw viewport
     clientX/clientY. Earlier this was `position: absolute` inside `.stage`,
     which caused horizontal drift because the canvas itself is centered with
     `left: 50%; translateX(-50%)`: cursor coords were canvas-relative but
     the tooltip's containing block was the wider `.stage`, so the tooltip
     landed offset by half the empty side margin. Fixed positioning sidesteps
     all of that. */
  .hub-tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--line-strong);
    box-shadow: 0 12px 40px rgba(71,10,104,0.15);
    padding: 14px 16px;
    min-width: 220px;
    transform: translate(12px, -50%);
    opacity: 0;
    transition: opacity 0.18s ease;
    z-index: 6;
  }
  .hub-tooltip.show { opacity: 1; }
  /* UK tooltip floats to the LEFT of the cursor; US stays to the right.
     Tight 4px offset keeps the card close. */
  .hub-tooltip.uk { transform: translate(calc(-100% - 4px), -50%); }
  .hub-tooltip.us { transform: translate(4px, -50%); }
  /* Wider so the funding currencies list wraps cleanly */
  .hub-tooltip { max-width: 320px; }
  .hub-tooltip::before {
    content: "";
    position: absolute;
    left: -1px; top: -1px;
    width: 8px; height: 8px;
    border-left: 1px solid var(--warm-orange);
    border-top: 1px solid var(--warm-orange);
  }
  .hub-tooltip::after {
    content: "";
    position: absolute;
    right: -1px; bottom: -1px;
    width: 8px; height: 8px;
    border-right: 1px solid var(--warm-orange);
    border-bottom: 1px solid var(--warm-orange);
  }
  .tooltip-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--warm-orange);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }
  .tooltip-tag.uk { color: var(--light-purple); }
  .tooltip-name {
    font-family: 'Poppins', sans-serif;
    font-weight: 500;
    font-size: 17px;
    color: var(--dark-purple);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .tooltip-meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(10,10,10,0.55);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .tooltip-meta b { color: var(--ink); font-weight: 500; }
  /* Funding-currency table — codes laid out in a fixed grid so each row has
     consistent columns. Separators sit BETWEEN columns (rendered as the
     pseudo-element on each cell except the last in its row). No leading or
     trailing dots; cells are centered for tabular alignment. */
  .tooltip-meta b.ccy-list {
    display: grid;
    grid-template-columns: repeat(4, auto);
    column-gap: 12px;
    row-gap: 2px;
    justify-content: start;
    align-items: baseline;
  }
  .tooltip-meta b.ccy-list .ccy {
    position: relative;
    white-space: nowrap;
  }
  /* Dot between columns: rendered as a centered pseudo-element to the LEFT
     of every cell EXCEPT the first column (cells 1, 5, 9, …). */
  .tooltip-meta b.ccy-list .ccy:not(:nth-child(4n+1))::before {
    content: "·";
    position: absolute;
    left: -8px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(10,10,10,0.4);
  }

  /* Lower content */
  .below {
    position: relative;
    z-index: 3;
    padding: 0 48px 80px;
  }
  .pillars {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border-top: 1px solid var(--line-strong);
  }
  .pillar {
    padding: 36px 32px 32px;
    border-right: 1px solid var(--line);
    position: relative;
  }
  .pillar:last-child { border-right: none; }
  .pillar-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--warm-orange);
    letter-spacing: 0.2em;
    margin-bottom: 20px;
  }
  .pillar h3 {
    font-weight: 500;
    font-size: 24px;
    line-height: 1.15;
    letter-spacing: -0.025em;
    margin-bottom: 14px;
    color: var(--dark-purple);
  }
  .pillar p {
    font-size: 14px;
    line-height: 1.6;
    color: rgba(10,10,10,0.65);
    margin-bottom: 20px;
  }
  .pillar-list {
    list-style: none;
    border-top: 1px solid var(--line);
    padding-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(10,10,10,0.55);
  }
  .pillar-list li {
    padding: 6px 0;
    display: flex;
    justify-content: space-between;
  }
  .pillar-list li b { color: var(--ink); font-weight: 500; }

  /* Footer strip */
  .strip {
    margin-top: 60px;
    padding: 28px 48px;
    border-top: 1px solid var(--line-strong);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: rgba(10,10,10,0.45);
  }
  .strip b { color: var(--dark-purple); font-weight: 500; }

  /* Legend over globe */
  .legend {
    position: absolute;
    left: 18px;
    bottom: 18px;
    z-index: 4;
    display: flex;
    flex-direction: column;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: rgba(10,10,10,0.6);
  }
  .legend .row { display: flex; align-items: center; gap: 10px; }
  .legend .swatch { width: 14px; height: 2px; }
  .legend .swatch.uk { background: var(--vivid-purple); box-shadow: 0 0 8px rgba(176,41,255,0.7); }
  .legend .swatch.us { background: var(--warm-orange); box-shadow: 0 0 8px rgba(241,91,64,0.7); }
  .legend .dot { width: 10px; height: 10px; }
  .legend .dot.hub-uk { background: var(--vivid-purple); border: 1px solid var(--off-white); border-radius: 50%; }
  .legend .dot.hub-us { background: var(--warm-orange); border: 1px solid var(--off-white); border-radius: 50%; }
  .legend .dot.dest { background: var(--dark-purple); border-radius: 50%; opacity: 0.7; }

  /* Live ticker */
  .ticker-wrap {
    position: absolute;
    /* Anchored to the globe's visual bottom-right.
       Globe radius in screen space ≈ 33vh (camera fov 40°, distance 8.27, R=2). */
    right: calc(50% - 33vh);
    bottom: calc(50% - 33vh);
    z-index: 4;
    background: rgba(255,255,255,0.85);
    border: 1px solid var(--line);
    box-shadow: 0 12px 40px rgba(71,10,104,0.10);
    padding: 10px 14px;
    min-width: 240px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .ticker-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(10,10,10,0.5);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .ticker-head .live { color: var(--warm-orange); }
  .ticker-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink);
    line-height: 1.4;
    letter-spacing: 0.02em;
    min-height: 32px;
  }
  .ticker-line .arrow { color: var(--warm-orange); margin: 0 6px; }
  .ticker-line .amt { color: var(--dark-purple); font-weight: 500; }

  /* ==================== SEARCH BAR ==================== */
  .search-shell {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 8;
    width: min(420px, calc(100vw - 96px));
    pointer-events: auto;
    /* Stack suggestions ABOVE the search box now that the shell sits at
       the bottom of the viewport. */
    display: flex;
    flex-direction: column-reverse;
  }
  .search-box {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.94);
    border: 1px solid var(--line-strong);
    box-shadow: none;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: box-shadow 0.2s ease, border-color 0.2s ease;
  }
  .search-box:focus-within {
    border-color: var(--vivid-purple);
    box-shadow: none;
  }
  .search-box::before {
    content: "";
    width: 8px; height: 8px;
    border-left: 1px solid var(--warm-orange);
    border-top: 1px solid var(--warm-orange);
    position: absolute; left: -1px; top: -1px;
  }
  .search-icon {
    width: 14px; height: 14px;
    flex-shrink: 0;
    color: var(--dark-purple);
  }
  .search-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    min-width: 0;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .search-input::placeholder { color: rgba(10,10,10,0.42); }
  .search-kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: rgba(10,10,10,0.5);
    border: 1px solid var(--line-strong);
    padding: 2px 5px;
    letter-spacing: 0.06em;
    flex-shrink: 0;
    background: rgba(245,245,245,0.6);
  }
  .search-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--warm-orange);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    flex-shrink: 0;
  }

  /* Suggestions dropdown */
  .search-suggest {
    /* Margin sits below the suggestions in DOM order, but column-reverse
       puts the suggestions above the search box — so this gap appears
       between the two as expected. */
    margin-bottom: 8px;
    background: rgba(255,255,255,0.97);
    border: 1px solid var(--line-strong);
    box-shadow: 0 18px 50px rgba(71,10,104,0.18);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    max-height: 360px;
    overflow-y: auto;
    display: none;
  }
  .search-shell.has-results .search-suggest { display: block; }
  .suggest-section {
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
  }
  .suggest-section:last-child { border-bottom: none; }
  .suggest-head {
    padding: 6px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: rgba(10,10,10,0.45);
  }
  .suggest-row {
    padding: 9px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    transition: background 0.12s ease;
    font-size: 13px;
  }
  .suggest-row:hover, .suggest-row.active {
    background: rgba(176,41,255,0.08);
  }
  .suggest-name {
    color: var(--ink);
    font-weight: 500;
    letter-spacing: -0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .suggest-name mark {
    background: rgba(241,91,64,0.18);
    color: var(--warm-orange);
    padding: 0 1px;
  }
  .suggest-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(10,10,10,0.5);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    flex-shrink: 0;
  }
  .suggest-empty {
    padding: 24px 16px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(10,10,10,0.5);
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }

  /* ==================== RESULT MODAL ==================== */
  /* Backdrop kept for click-to-dismiss but invisible — the result card
     is now docked, not a centered overlay, so we don't dim the globe. */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: transparent;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.32s ease;
  }
  .modal-backdrop.show { opacity: 1; pointer-events: auto; }
  /* Result card: docks above the search bar at the bottom of the viewport.
     Slides up on open; the search bar remains visible and usable below. */
  .modal {
    position: fixed;
    left: 50%;
    bottom: 92px; /* sits clear of the (now-shorter) search bar */
    transform: translate(-50%, 24px);
    width: min(560px, calc(100vw - 64px));
    max-height: min(520px, calc(100vh - 180px));
    background: #FFFFFF;
    border: 1px solid var(--line-strong);
    box-shadow: 0 24px 60px rgba(71,10,104,0.20), 0 6px 20px rgba(71,10,104,0.10);
    z-index: 51;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: transform 0.36s cubic-bezier(.2,.8,.2,1), opacity 0.32s ease;
  }
  .modal.show {
    transform: translate(-50%, 0);
    opacity: 1;
    pointer-events: auto;
  }
  /* Brand corner ticks */
  .modal::before, .modal::after {
    content: "";

<script>
// ---------- DATA LOADER ----------
// Single source of truth: payment-options.json (sibling file, hosted with
// this index.html on GitHub). Loaded over fetch() so the configuration can
// be edited and republished independently of this code.
//
// On-disk shape is HUB-KEYED: a top-level `hubs` array, each hub holding
// its own `supportedCountries` (with per-country paymentMethods + delivery)
// and its own `fundingCurrencies`. We invert that here into the flat
// country/currency/scheme indexes the rest of the app already consumes.
window.__HUB_META = null;       // populated below; used by the globe layer
window.__PAYMENT_OPTIONS = null; // raw JSON, kept for diagnostics

window.VitesseDataReady = (async () => {
  let raw;
  try {
    const res = await fetch('payment-options.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    raw = await res.json();
  } catch (err) {
    throw new Error('Failed to load payment-options.json: ' + err.message);
  }
  window.__PAYMENT_OPTIONS = raw;

  const hubsArr = raw.hubs || [];
  // Hub identity + funding currencies, keyed by hub id, for the globe layer.
  window.__HUB_META = hubsArr.reduce((acc, h) => {
    acc[h.id] = {
      id: h.id, name: h.name, entity: h.entity, regulator: h.regulator,
      city: h.city, lat: h.lat, lon: h.lon,
      fundingCurrencies: h.fundingCurrencies || [],
    };
    return acc;
  }, {});

  // Invert hub-keyed structure → flat country index.
  // Each country may appear under multiple hubs; we merge methods + delivery.
  const countries = {};
  hubsArr.forEach(hub => {
    (hub.supportedCountries || []).forEach(d => {
      let c = countries[d.country];
      if (!c) {
        c = countries[d.country] = {
          name: d.country,
          iso2: d.iso2, iso3: d.iso3,
          lat: d.lat, lon: d.lon,
          ccy: d.currency, region: d.region,
          paymentMethods: [],   // union, with hubs[] reattached
          ukMethods: [],
          usMethods: [],
          hubDelivery: { uk: null, us: null },
        };
      }
      c.hubDelivery[hub.id] = d.delivery || null;
      const bucketKey = hub.id + 'Methods';
      (d.paymentMethods || []).forEach(pm => {
        const annotated = { type: pm.type };
        if (pm.type === 'Domestic Bank Transfer') {
          annotated.schemes = Array.isArray(pm.schemes) ? pm.schemes : [];
        }
        if (c[bucketKey]) c[bucketKey].push(annotated);
        // Union list with hubs[] — merge into existing entry of same type
        // (and same schemes, when applicable) so the legacy consumer that
        // expects { type, hubs[], schemes[] } still works.
        const sameSchemes = (a, b) => {
          if (a.type !== 'Domestic Bank Transfer') return true;
          const sa = (a.schemes || []).slice().sort().join('|');
          const sb = (b.schemes || []).slice().sort().join('|');
          return sa === sb;
        };
        let existing = c.paymentMethods.find(p => p.type === pm.type && sameSchemes(p, annotated));
        if (!existing) {
          existing = { type: pm.type, hubs: [] };
          if (pm.type === 'Domestic Bank Transfer') existing.schemes = annotated.schemes;
          c.paymentMethods.push(existing);
        }
        if (!existing.hubs.includes(hub.id)) existing.hubs.push(hub.id);
      });
    });
  });

  // Currency index — group countries by currency
  const currencies = {};
  Object.values(countries).forEach(c => {
    const code = c.ccy;
    if (!currencies[code]) currencies[code] = { code, name: code, countries: [] };
    currencies[code].countries.push(c.name);
  });
  Object.values(currencies).forEach(cur => cur.countries.sort());

  // Scheme reverse index — every Domestic Bank Transfer scheme → countries[]
  const schemes = {};
  Object.values(countries).forEach(c => {
    (c.paymentMethods || []).forEach(pm => {
      if (pm.type !== 'Domestic Bank Transfer') return;
      (pm.schemes || []).forEach(s => {
        if (!schemes[s]) schemes[s] = { name: s, countries: [] };
        if (!schemes[s].countries.includes(c.name)) schemes[s].countries.push(c.name);
      });
    });
  });
  Object.values(schemes).forEach(sc => sc.countries.sort());

  const data = { countries, currencies, schemes, regions: raw.regions || [] };
  window.VitesseData = data;
  window.dispatchEvent(new CustomEvent('vitesse-data-ready', { detail: data }));
  return data;
})().catch(err => {
  console.error('[vitesse] data load failed', err);
  return { countries: {}, currencies: {}, schemes: {}, regions: [] };
});
</script>

<script type="module">
import * as THREE from 'three';

// ---------- DATA ----------
// Hub identity (city / lat,lon / entity / regulator / fundingCurrencies)
// is loaded from payment-options.json via window.__HUB_META. We block the
// module on VitesseDataReady before building hubs.
await window.VitesseDataReady;
const HUB_COLORS = { uk: 0xB029FF, us: 0xF15B40 };
const HUBS = [
  { ...(window.__HUB_META?.uk || { id:'uk', name:'UK Hub', city:'London', entity:'Vitesse PSP Ltd', regulator:'FCA · DNB', lat:51.5074, lon:-0.1278, fundingCurrencies:[] }),
    color: HUB_COLORS.uk, currencies: (window.__HUB_META?.uk?.fundingCurrencies) || [] },
  { ...(window.__HUB_META?.us || { id:'us', name:'US Hub', city:'New York', entity:'Vitesse Trust Company, LLC', regulator:'NYDFS', lat:40.7128, lon:-74.0060, fundingCurrencies:[] }),
    color: HUB_COLORS.us, currencies: (window.__HUB_META?.us?.fundingCurrencies) || [] },
];

// Destination cities — 500 cities across all 144 supported countries.
// Loaded from cities-500.js (see <script src> in head).
// Each entry: { name, lat, lon, country, region: 'us'|'eu'|'rest', via: 'us'|'uk'|'both' }.
// `region` drives hub→destination traffic-mix weighting.
// `via` controls which hub(s) can route to this destination.
const DESTS = window.__DESTS_500 || [];

// ---------- SETUP ----------
const canvas = document.getElementById('globe-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
// Pull camera back to ~1/0.75x so globe appears at ~75% of previous scale
camera.position.set(0, 0, 8.27);

// Lighting (white-mode: tighter contrast, less colored cast)
scene.add(new THREE.AmbientLight(0xffffff, 0.85));
const keyLight = new THREE.DirectionalLight(0xffffff, 0.55);
keyLight.position.set(-3, 2, 4);
scene.add(keyLight);
const rim = new THREE.DirectionalLight(0x831fbf, 0.35);
rim.position.set(3, -1, -2);
scene.add(rim);

// Globe rig: outer tilt group (camera-style pitch) wraps inner spin group
// (rotates around true vertical Y axis). This keeps the north pole pinned
// to the top of the screen no matter how much the user spins.
const globeTilt = new THREE.Group();
scene.add(globeTilt);
const globe = new THREE.Group();
globeTilt.add(globe);
// Slight forward tilt so the northern hemisphere reads naturally.
// Defined as a single source of truth so resetView() returns to the same pose.
const BASE_TILT_X = 0.32 + (10 * Math.PI / 180); // ~28° forward
globeTilt.rotation.x = BASE_TILT_X;

const RADIUS = 2;

// Sphere base (off-white with slight purple wash so dots read clearly)
const sphereGeo = new THREE.SphereGeometry(RADIUS, 64, 64);
const sphereMat = new THREE.MeshPhongMaterial({
  color: 0xF7F4FA,
  emissive: 0xEFE9F4,
  shininess: 4,
  specular: 0xCFBFE0,
  transparent: true,
  opacity: 1.0,
});
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
globe.add(sphere);

// Atmosphere glow (back-side rim)

// Lat/lon graticule
function makeGraticule() {
  const grp = new THREE.Group();
  const mat = new THREE.LineBasicMaterial({ color: 0xCFBFE0, transparent: true, opacity: 0.55 });
  // parallels
  for (let lat = -75; lat <= 75; lat += 15) {
    const pts = [];
    const phi = (90 - lat) * Math.PI / 180;
    for (let lon = 0; lon <= 360; lon += 4) {
      const theta = lon * Math.PI / 180;
      pts.push(new THREE.Vector3(
        RADIUS * 1.001 * Math.sin(phi) * Math.cos(theta),
        RADIUS * 1.001 * Math.cos(phi),
        -RADIUS * 1.001 * Math.sin(phi) * Math.sin(theta),
      ));
    }
    const g = new THREE.BufferGeometry().setFromPoints(pts);
    grp.add(new THREE.Line(g, mat));
  }
  // meridians
  for (let lon = 0; lon < 360; lon += 15) {
    const pts = [];
    const theta = lon * Math.PI / 180;
    for (let lat = -90; lat <= 90; lat += 4) {
      const phi = (90 - lat) * Math.PI / 180;
      pts.push(new THREE.Vector3(
        RADIUS * 1.001 * Math.sin(phi) * Math.cos(theta),
        RADIUS * 1.001 * Math.cos(phi),
        -RADIUS * 1.001 * Math.sin(phi) * Math.sin(theta),
      ));
    }
    const g = new THREE.BufferGeometry().setFromPoints(pts);
    grp.add(new THREE.Line(g, mat));
  }
  return grp;
}
globe.add(makeGraticule());

let landMask = makeLandmaskCanvas();
function isLand(lat, lon) {
  const W = landMask.width, H = landMask.height;
  let x = Math.floor(((lon + 180) / 360) * W);
  let y = Math.floor(((90 - lat) / 180) * H);
  if (x<0) x=0; if (x>=W) x=W-1; if (y<0) y=0; if (y>=H) y=H-1;
  const i = (y * W + x) * 4;
  return landMask.data[i] > 100;
}

// Build dot mesh (instanced spheres) only over land
function makeDots(step) {
  const positions = [];
  const STEP = step || 1.6; // degrees
  for (let lat = -80; lat <= 80; lat += STEP) {
    // longitude step compensates for latitude convergence
    const lonStep = STEP / Math.max(Math.cos(lat * Math.PI/180), 0.18);
    for (let lon = -180; lon < 180; lon += lonStep) {
      if (!isLand(lat, lon)) continue;
      const phi = (90 - lat) * Math.PI/180;
      const theta = lon * Math.PI/180;
      const r = RADIUS * 1.005;
      positions.push(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.cos(phi),
        -r * Math.sin(phi) * Math.sin(theta),
      );
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: 0x470A68,
    size: 0.014,
    transparent: true,
    opacity: 0.85,
    sizeAttenuation: true,
  });
  return new THREE.Points(geo, mat);
}
let dotsMesh = makeDots();
globe.add(dotsMesh);

// ---------- Real-coastline upgrade ----------
// The procedural polygons above are a fallback. At runtime, fetch real
// Natural Earth data (plain GeoJSON, no TopoJSON dependency) and rebuild
// the landmask + dot grid for a properly accurate world map. Tries 50m
// (high detail) first, falls back to 110m, falls back to procedural.
window.__upgradeState = 'pending';
(async function upgradeLandmask() {
  window.__upgradeState = 'started';
  const SOURCES = [
    // Higher detail \u2014 ~500KB, gives noticeably crisper coastlines
    'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_land.geojson',
    // Smaller, still much better than the procedural shapes
    'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_land.geojson',
  ];

  let gj = null;
  for (const url of SOURCES) {
    try {
      const res = await fetch(url, { mode: 'cors' });
      if (!res.ok) continue;
      gj = await res.json();
      console.log('[globe] loaded coastlines from', url, '\u2014',
        gj.features ? gj.features.length : '?', 'features');
      break;
    } catch (e) {
      console.warn('[globe] coastline fetch failed for', url, e);
    }
  }
  if (!gj) {
    console.warn('[globe] all coastline sources failed; staying on procedural fallback');
    return;
  }

  // Render GeoJSON to a higher-res landmask canvas. Bumping to 1440x720
  // (0.25\u00b0 per pixel) gives the dot-grid sampler enough fidelity to
  // resolve smaller islands and coastline detail.
  const W = 1440, H = 720;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';

  const proj = (lon, lat) => [((lon + 180) / 360) * W, ((90 - lat) / 180) * H];

  // Draw a single ring as a closed filled path. Splits the ring at any
  // edge that crosses the antimeridian (\u00b1180\u00b0 longitude jump > 180\u00b0)
  // so polygons like Russia/Antarctica don\u2019t streak across the canvas.
  function drawRing(ring) {
    if (!ring || ring.length < 3) return;
    const segments = [[]];
    for (let i = 0; i < ring.length; i++) {
      const [lon, lat] = ring[i];
      if (i > 0) {
        const [prevLon] = ring[i - 1];
        if (Math.abs(lon - prevLon) > 180) segments.push([]);
      }
      segments[segments.length - 1].push([lon, lat]);
    }
    segments.forEach(seg => {
      if (seg.length < 3) return;
      ctx.beginPath();
      seg.forEach(([lon, lat], i) => {
        const [x, y] = proj(lon, lat);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
    });
  }

  function drawGeometry(geom) {
    if (!geom) return;
    if (geom.type === 'Polygon') {
      geom.coordinates.forEach(drawRing);
    } else if (geom.type === 'MultiPolygon') {
      geom.coordinates.forEach(poly => poly.forEach(drawRing));
    } else if (geom.type === 'GeometryCollection') {
      geom.geometries.forEach(drawGeometry);
    }
  }

  if (gj.type === 'FeatureCollection') {
    gj.features.forEach(f => drawGeometry(f.geometry));
  } else if (gj.type === 'Feature') {
    drawGeometry(gj.geometry);
  } else {
    drawGeometry(gj);
  }

  landMask = ctx.getImageData(0, 0, W, H);

  // Rebuild the dot grid against the new mask. Tighter step now that we
  // have real data \u2014 islands and coastlines have detail to show.
  try {
    globe.remove(dotsMesh);
    dotsMesh = makeDots(0.85);
    globe.add(dotsMesh);
    window.__upgradeState = 'done:' + dotsMesh.geometry.attributes.position.count;
  } catch (e) {
    window.__upgradeState = 'err-rebuild:' + e.message;
  }
})().catch(e => { window.__upgradeState = 'err-iife:' + e.message; });

// Helpers
function latLonToVec3(lat, lon, r = RADIUS) {
  const phi = (90 - lat) * Math.PI/180;
  const theta = lon * Math.PI/180;
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    -r * Math.sin(phi) * Math.sin(theta),
  );
}

// Hub markers (hexagonal pillars)
const hubMeshes = [];
function makeHubMarker(hub) {
  const grp = new THREE.Group();
  grp.userData = { hub, type: 'hub' };

  const pos = latLonToVec3(hub.lat, hub.lon, RADIUS);
  // Outer ring
  const ringGeo = new THREE.RingGeometry(0.045, 0.075, 6);
  const ringMat = new THREE.MeshBasicMaterial({ color: hub.color, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  // Hex core
  const coreGeo = new THREE.CircleGeometry(0.035, 6);
  const coreMat = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
  const core = new THREE.Mesh(coreGeo, coreMat);

  // Pulse (animated)
  const pulseGeo = new THREE.RingGeometry(0.06, 0.075, 24);
  const pulseMat = new THREE.MeshBasicMaterial({ color: hub.color, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
  const pulse = new THREE.Mesh(pulseGeo, pulseMat);

  grp.add(ring, core, pulse);

  // Orient flat to surface (face outward)
  grp.position.copy(pos);
  grp.lookAt(pos.clone().multiplyScalar(2));

  grp.userData.pulse = pulse;
  globe.add(grp);
  hubMeshes.push(grp);

  // Engraved-style label sitting on the globe surface, just south of the hub.
  // Rendered to a canvas with a dark drop shadow + white highlight to fake
  // the look of text physically carved into the sphere.
  makeHubLabel(hub);

  return grp;
}

function makeHubLabel(hub) {
  const W = 768, H = 192;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  ctx.font = '900 110px "Inter", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Slight letter-spacing feel: render once, then scale x slightly via transform
  const text = (hub.id === 'uk' ? 'UK HUB' : 'US HUB');
  const cx = W / 2, cy = H / 2;

  // Carved/engraved effect — three-layer paint:
  // 1) deep dark shadow offset down-right (the "depth" of the engraving)
  ctx.fillStyle = 'rgba(20,5,40,0.85)';
  ctx.fillText(text, cx + 3, cy + 3);
  // 2) bright highlight offset up-left (the lit upper edge of the groove)
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillText(text, cx - 1.5, cy - 1.5);
  // 3) main fill in the hub's color, slightly darker to read as "inside the groove"
  const hex = '#' + hub.color.toString(16).padStart(6, '0');
  ctx.fillStyle = hex;
  ctx.globalAlpha = 0.95;
  ctx.fillText(text, cx, cy);
  ctx.globalAlpha = 1;

  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 8;
  tex.minFilter = THREE.LinearFilter;

  const planeW = 0.62;
  const planeH = planeW * (H / W);
  const geo = new THREE.PlaneGeometry(planeW, planeH);
  const mat = new THREE.MeshBasicMaterial({
    map: tex, transparent: true, depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);

  // Position ~5° south of the hub, slightly off the surface so it doesn't
  // z-fight with the dot-grid texture.
  const labelLat = hub.lat - 4.5;
  const pos = latLonToVec3(labelLat, hub.lon, RADIUS * 1.012);
  mesh.position.copy(pos);

  // Build an explicit local basis so the label always lies flush on the
  // surface AND its "up" points toward the north pole tangent. This is
  // more robust than lookAt + post-correction (which broke at certain
  // latitudes because the angle sign flipped).
  const normal = pos.clone().normalize();                  // out of surface
  const worldUp = new THREE.Vector3(0, 1, 0);
  const up = worldUp.clone()
    .sub(normal.clone().multiplyScalar(worldUp.dot(normal)))
    .normalize();                                          // toward N pole, on surface
  const right = new THREE.Vector3().crossVectors(up, normal).normalize();
  // Plane's local axes: +X = right, +Y = up, +Z = normal (out)
  const m4 = new THREE.Matrix4().makeBasis(right, up, normal);
  mesh.quaternion.setFromRotationMatrix(m4);

  globe.add(mesh);
  return mesh;
}

// Destination markers
const destMeshes = [];
const destByName = new Map();
function makeDestMarker(dest) {
  const pos = latLonToVec3(dest.lat, dest.lon, RADIUS * 1.005);
  const geo = new THREE.SphereGeometry(0.018, 10, 10);
  // 'both' destinations: shown in US orange since US is the geographically
  // closer / preferred hub for the Americas. UK Hub also reaches them.
  const color = dest.via === 'uk' ? 0xB029FF : 0xF15B40;
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.95 });
  const m = new THREE.Mesh(geo, mat);
  m.position.copy(pos);
  // arrivals = list of in-flight payments currently in their post-landing
  // fade phase for this destination. Drives bullet visibility/opacity/color.
  m.userData = { dest, type: 'dest', arrivals: [] };
  m.visible = false;
  globe.add(m);
  destMeshes.push(m);
  destByName.set(dest.name, m);
  return m;
}

HUBS.forEach(makeHubMarker);
DESTS.forEach(makeDestMarker);

// Arc routes from each hub to each destination of same `via`
const routeGroup = new THREE.Group();
globe.add(routeGroup);

// One-shot payment animation: head sweeps to the destination, then tail
// follows. When tail reaches the destination, the line is disposed.
//   Phase A  head leads, tail at hub        → segment grows
//   Phase B  both advance at same speed     → segment slides
//   Phase C  head at destination, tail moves → segment shrinks
function spawnPayment(from, to, color) {
  const v1 = latLonToVec3(from.lat, from.lon, RADIUS);
  const v2 = latLonToVec3(to.lat, to.lon, RADIUS);
  const distance = v1.distanceTo(v2);
  // Composite arc: smooth ascent → high cruise → smooth descent.
  // Built by sampling along the great-circle (slerp) and modulating altitude
  // with a profile that ramps up quickly, holds high in the middle, and
  // ramps back down. Avoids any below-surface dip on long paths.
  const angle = v1.angleTo(v2);
  // Cruise altitude: low and roughly constant — paths hug the globe.
  const cruise = THREE.MathUtils.clamp(distance * 0.04, 0.015, 0.06);
  // Ramp distance (fraction of arc) — longer arcs ramp over a smaller fraction
  // because in absolute angle the ramp can stay short and steep.
  const rampFrac = THREE.MathUtils.clamp(0.6 / Math.max(angle, 0.01), 0.08, 0.45);
  const N = 64;
  const samplePts = new Array(N + 1);
  // Great-circle direction: rotate v1 around the axis perp to (v1, v2)
  const axis = new THREE.Vector3().crossVectors(v1, v2).normalize();
  const v1n = v1.clone().normalize();
  for (let i = 0; i <= N; i++) {
    const u = i / N;
    // Slerp position on the unit sphere
    const dir = v1n.clone().applyAxisAngle(axis, angle * u);
    // Altitude profile: smoothstep up over [0, rampFrac], hold at 1, smoothstep
    // down over [1-rampFrac, 1]. Result is in [0, 1], multiplied by cruise.
    let h;
    if (u < rampFrac) {
      const k = u / rampFrac;
      h = k * k * (3 - 2 * k); // smoothstep
    } else if (u > 1 - rampFrac) {
      const k = (1 - u) / rampFrac;
      h = k * k * (3 - 2 * k);
    } else {
      h = 1;
    }
    samplePts[i] = dir.multiplyScalar(RADIUS + cruise * h);
  }
  // Wrap in CatmullRom so the rest of the code keeps using getPoint / getLength.
  const curve = new THREE.CatmullRomCurve3(samplePts, false, 'catmullrom', 0.5);

  // Pre-sample the curve once; we'll slice this for the visible segment.
  const SEG_SAMPLES = 80;
  const sampled = curve.getPoints(SEG_SAMPLES);

  // Pre-allocate a max-size position buffer for setDrawRange.
  const maxVerts = SEG_SAMPLES + 3;
  const positions = new Float32Array(maxVerts * 3);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setDrawRange(0, 0);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7 });
  const line = new THREE.Line(geo, mat);
  // Bounding sphere is computed from the full preallocated buffer (including
  // zero-init slots past drawRange), which can place the sphere wrong and
  // cause frustum culling to drop the line in some camera angles.
  line.frustumCulled = false;
  routeGroup.add(line);

  // Constant world-speed so long/short arcs take time proportional to length.
  const curveLen = curve.getLength();
  const ARC_UNITS_PER_SEC = 0.90;
  const jitter = 0.85 + Math.random() * 0.30;
  const baseSpeed = (ARC_UNITS_PER_SEC * jitter) / Math.max(curveLen, 0.001);

  // SLA multiplier (real-time corridors animate faster).
  const country = VData?.countries?.[CITY_TO_COUNTRY?.[to.name]];
  const slaMult = (country && isRealtimeCountry?.(country)) ? 2.0 : 1.0;

  const payment = {
    line,
    via: from.id,
    curve,
    curveLen,
    sampled,
    segSamples: SEG_SAMPLES,
    speed: baseSpeed * slaMult,
    // phaseT 0→1 = head outbound (tail anchored at hub).
    // phaseT 1→2 = tail catches up (head anchored at destination).
    phaseT: 0,
    headArrived: false,
    dest: to,
    hubColor: color,
  };
  payments.push(payment);
  return payment;
}

// Active in-flight payments; updated each frame and culled when done.
const payments = [];

// Fill a payment line's position buffer with the [a,b] slice of its curve.
// Shared by phase-1 (growing segment) and phase-2 (full path during fade).
function writeArcSegment(ln, p, a, b) {
  const samples = p.sampled;
  const N = p.segSamples;
  const posAttr = ln.geometry.attributes.position;
  const arr = posAttr.array;
  let w = 0;

  const pStart = p.curve.getPoint(a);
  arr[w++] = pStart.x; arr[w++] = pStart.y; arr[w++] = pStart.z;

  const iStart = Math.ceil(a * N) + (a * N === Math.ceil(a * N) ? 1 : 0);
  const iEnd = Math.floor(b * N) - (b * N === Math.floor(b * N) ? 1 : 0);
  for (let k = iStart; k <= iEnd; k++) {
    if (k < 0 || k > N) continue;
    const sp = samples[k];
    arr[w++] = sp.x; arr[w++] = sp.y; arr[w++] = sp.z;
  }

  const pEnd = p.curve.getPoint(b);
  arr[w++] = pEnd.x; arr[w++] = pEnd.y; arr[w++] = pEnd.z;

  posAttr.needsUpdate = true;
  ln.geometry.setDrawRange(0, w / 3);
  ln.geometry.computeBoundingSphere();
}

// ---------- LOCAL RAILS ----------
// When a traveler reaches its destination, spawn a small cluster of short
// arcs radiating across local territory to suggest in-country payment rails.
// Subtle, secondary palette (light orange / pastel purple).
const localGroup = new THREE.Group();
globe.add(localGroup);
const localBursts = []; // {lines:[{line, len, born}], born, life}

function spawnLocalRails(dest, viaId) {
  const center = latLonToVec3(dest.lat, dest.lon, RADIUS);
  const count = 1; // single local rail per delivery
  const baseColor = viaId === 'uk' ? 0x831FBF : 0xF15B40; // purple / warm orange
  const burst = { lines: [], born: performance.now(), life: 1800, viaId };

  for (let i = 0; i < count; i++) {
    // Try up to 12 candidate endpoints; only keep ones that fall on land so
    // local rails don't reach into oceans / off-island.
    let endLat = dest.lat, endLon = dest.lon, found = false;
    for (let attempt = 0; attempt < 12; attempt++) {
      const angle = Math.random() * Math.PI * 2;
      // Shrink reach with each failed attempt so islands still get a few rails
      const reach = (0.5 + Math.random() * 2.2) * (1 - attempt * 0.06);
      const dLat = Math.sin(angle) * reach;
      const dLon = Math.cos(angle) * reach / Math.max(Math.cos(dest.lat * Math.PI/180), 0.25);
      const cLat = THREE.MathUtils.clamp(dest.lat + dLat, -85, 85);
      const cLon = dest.lon + dLon;
      // Also sample the midpoint — ensures the arc itself stays over land
      const midLat = (dest.lat + cLat) / 2;
      const midLon = (dest.lon + cLon) / 2;
      if (isLand(cLat, cLon) && isLand(midLat, midLon)) {
        endLat = cLat; endLon = cLon; found = true; break;
      }
    }
    if (!found) continue; // skip this rail rather than draw into the ocean
    const v2 = latLonToVec3(endLat, endLon, RADIUS);

    // Low, hugging arc — barely lifted above the surface
    const mid = center.clone().add(v2).multiplyScalar(0.5).normalize().multiplyScalar(RADIUS + 0.04);
    const curve = new THREE.QuadraticBezierCurve3(center.clone().multiplyScalar(RADIUS / center.length() * 1.002), mid, v2.clone().multiplyScalar(RADIUS / v2.length() * 1.002));
    const pts = curve.getPoints(24);
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color: baseColor, transparent: true, opacity: 0 });
    const line = new THREE.Line(geo, mat);
    line.userData = { viaId };
    localGroup.add(line);

    // Tiny end-dot (the "delivered" pin)
    const dotGeo = new THREE.SphereGeometry(0.012, 8, 8);
    const dotMat = new THREE.MeshBasicMaterial({ color: baseColor, transparent: true, opacity: 0 });
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.copy(v2);
    dot.userData = { viaId };
    localGroup.add(dot);

    burst.lines.push({ line, dot, delay: i * 90 });
  }
  localBursts.push(burst);

  // Cap pool to avoid runaway memory
  if (localBursts.length > 60) {
    const old = localBursts.shift();
    old.lines.forEach(({ line, dot }) => {
      localGroup.remove(line); line.geometry.dispose(); line.material.dispose();
      localGroup.remove(dot);  dot.geometry.dispose();  dot.material.dispose();
    });
  }
}

function updateLocalBursts(now) {
  for (let bi = localBursts.length - 1; bi >= 0; bi--) {
    const b = localBursts[bi];
    const visible = (activeEntity === 'all' || activeEntity === b.viaId);
    let allDead = true;
    b.lines.forEach(({ line, dot, delay }) => {
      const age = now - b.born - delay;
      if (age < 0) { line.material.opacity = 0; dot.material.opacity = 0; allDead = false; return; }
      const k = age / b.life;
      if (k < 1) allDead = false;
      // Fade in then out, peak around k=0.35
      const env = k < 0.35 ? (k / 0.35) : Math.max(0, 1 - (k - 0.35) / 0.65);
      const op = visible ? env * 0.75 : 0;
      line.material.opacity = op;
      dot.material.opacity  = visible ? env * 0.95 : 0;
    });
    if (allDead) {
      b.lines.forEach(({ line, dot }) => {
        localGroup.remove(line); line.geometry.dispose(); line.material.dispose();
        localGroup.remove(dot);  dot.geometry.dispose();  dot.material.dispose();
      });
      localBursts.splice(bi, 1);
    }
  }
}

// ---------- TRAFFIC GENERATOR ----------
// Each hub fires payments at PAYMENTS_PER_SEC. Destinations are picked by
// region weight:
//   UK hub  → 50% US cities, 30% Europe, 20% rest
//   US hub  → 80% US cities, 20% rest of supported destinations
const PAYMENTS_PER_SEC = 10;
const HUB_WEIGHTS = {
  uk: { eu: 0.50, us: 0.30, rest: 0.20 },
  us: { us: 0.80, rest: 0.20 }, // 'eu' implicitly 0
};
const HUB_COLOR = { uk: 0xB029FF, us: 0xF15B40 };

// Pre-bucket destinations per (hub, region), respecting each city's `via`.
// UK hub serves destinations with via 'uk' or 'both'; US hub serves
// destinations with via 'us' or 'both'. This mirrors the real supported
// destination lists for each hub — no city fires from a hub that doesn't
// actually serve it.
const DEST_BUCKETS = {
  uk: { us: [], eu: [], rest: [] },
  us: { us: [], rest: [] },
};
DESTS.forEach(d => {
  const ukOK = (d.via === 'uk' || d.via === 'both');
  const usOK = (d.via === 'us' || d.via === 'both');
  if (ukOK && DEST_BUCKETS.uk[d.region]) DEST_BUCKETS.uk[d.region].push(d);
  if (usOK) {
    if (d.region === 'us') DEST_BUCKETS.us.us.push(d);
    else DEST_BUCKETS.us.rest.push(d);
  }
});

function pickRegion(hubId) {
  const w = HUB_WEIGHTS[hubId];
  const r = Math.random();
  let acc = 0;
  for (const region in w) {
    acc += w[region];
    if (r < acc) return region;
  }
  // Fallback (rounding): return last key
  return Object.keys(w).pop();
}
function pickDestination(hubId) {
  const region = pickRegion(hubId);
  const bucket = DEST_BUCKETS[hubId]?.[region];
  if (!bucket || bucket.length === 0) {
    // Bucket empty (shouldn't happen) — fall back to any reachable dest.
    const all = Object.values(DEST_BUCKETS[hubId]).flat();
    return all[Math.floor(Math.random() * all.length)];
  }
  return bucket[Math.floor(Math.random() * bucket.length)];
}

function firePayment(hubId) {
  const hub = HUBS.find(h => h.id === hubId);
  const dest = pickDestination(hubId);
  if (!hub || !dest) return;
  spawnPayment(hub, dest, HUB_COLOR[hubId]);
}

// ---------- COUNTRY-FOCUSED PAYMENTS ----------
// While a country card is open, fire one extra payment per second targeting
// a random city in that country. Picks a hub that actually serves it.
let activeCountry = null;
let countryPaymentTimer = null;
function fireCountryPayment() {
  if (!activeCountry) return;
  const cities = DESTS.filter(d => d.country === activeCountry.name);
  if (!cities.length) return;
  const city = cities[Math.floor(Math.random() * cities.length)];
  // Pick hub: prefer one of the hubs that actually serves this country.
  const hubsServing = new Set();
  (activeCountry.paymentMethods || []).forEach(pm =>
    (pm.hubs || []).forEach(h => hubsServing.add(h)));
  // Fall back to the city's own `via` field if country data is unavailable.
  let hubId;
  if (hubsServing.size === 0) {
    hubId = city.via === 'us' ? 'us' : 'uk';
  } else if (hubsServing.size === 1) {
    hubId = [...hubsServing][0];
  } else {
    // Both hubs serve it — pick one at random per spawn.
    hubId = Math.random() < 0.5 ? 'uk' : 'us';
  }
  const hub = HUBS.find(h => h.id === hubId);
  if (!hub) return;
  spawnPayment(hub, city, HUB_COLOR[hubId]);
}
function startCountryPayments(country) {
  activeCountry = country;
  if (countryPaymentTimer) clearInterval(countryPaymentTimer);
  // Fire one immediately so the user sees instant feedback, then 1/sec.
  fireCountryPayment();
  countryPaymentTimer = setInterval(fireCountryPayment, 1000);
}
function stopCountryPayments() {
  activeCountry = null;
  if (countryPaymentTimer) { clearInterval(countryPaymentTimer); countryPaymentTimer = null; }
}

// Drive the spawn rate from rAF so it pauses when the tab is hidden.
let lastSpawn = performance.now();
function spawnTick(now) {
  // Clamp dt to avoid a huge burst when the tab regains focus after being
  // hidden for minutes — rAF pauses while hidden, so `now - lastSpawn` can
  // jump arbitrarily far. Without this clamp, the next frame would try to
  // spawn `dt * PAYMENTS_PER_SEC` bullets (thousands) and freeze the page.
  const dt = Math.min((now - lastSpawn) / 1000, 0.1);
  // Expected spawns this frame per hub
  const expected = dt * PAYMENTS_PER_SEC;
  // Use Math.random() for fractional rates so we average exactly 10/s.
  ['uk', 'us'].forEach(hubId => {
    let n = Math.floor(expected);
    if (Math.random() < (expected - n)) n++;
    for (let i = 0; i < n; i++) firePayment(hubId);
  });
  lastSpawn = now;
  requestAnimationFrame(spawnTick);
}
requestAnimationFrame(spawnTick);

// Pause the per-second timers while the tab is hidden — without this, the
// country-payment interval and ticker keep firing in the background, queuing
// work (and Three.js meshes) that all blasts through on the next frame when
// the tab regains focus. We also reset `lastSpawn` so the spawn-tick clamp
// above starts cleanly from the moment of return.
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (countryPaymentTimer) { clearInterval(countryPaymentTimer); countryPaymentTimer = null; }
    if (window.__tickerInterval) { clearInterval(window.__tickerInterval); window.__tickerInterval = null; }
  } else {
    // Resume country-payment loop only if a country is still active.
    if (activeCountry && !countryPaymentTimer) {
      countryPaymentTimer = setInterval(fireCountryPayment, 1000);
    }
    // Resume ticker.
    if (!window.__tickerInterval) {
      window.__tickerInterval = setInterval(tickTicker, 2400);
    }
    lastSpawn = performance.now();
  }
});

function spinTo(lat, lon) {
  // Bring (lat, lon) to face the camera (camera looks down -Z toward origin).
  // With latLonToVec3 = (sinφcosθ, cosφ, -sinφsinθ), the point at lon=0 sits on
  // +X. To rotate that longitude to +Z (toward viewer) we need rotation.y = -π/2 + (-θ).
  const targetY = -Math.PI / 2 - (lon * Math.PI / 180);
  const targetTilt = THREE.MathUtils.clamp(lat * Math.PI / 180, -0.6, 0.9);
  animateView(targetY, targetTilt, 1100);
}

// Initial framing constants \u2014 must mirror the values set at scene setup.
const INITIAL_ROT_Y = -0.9;
const INITIAL_TILT_X = BASE_TILT_X;
function resetView() {
  animateView(INITIAL_ROT_Y, INITIAL_TILT_X, 900);
}

function animateView(targetY, targetTilt, dur) {
  const startY = globe.rotation.y;
  const dy = ((targetY - startY + Math.PI) % (Math.PI * 2)) - Math.PI;
  const startTilt = globeTilt.rotation.x;
  const dTilt = targetTilt - startTilt;
  const t0 = performance.now();
  function step(now) {
    const t = Math.min((now - t0) / dur, 1);
    const e = 1 - Math.pow(1 - t, 3);
    globe.rotation.y = startY + dy * e;
    globeTilt.rotation.x = startTilt + dTilt * e;
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

  let nearest = null, bestD = Infinity;
  destMeshes.forEach(m => {
    const d = m.position.distanceTo(target);
    if (d < bestD) { bestD = d; nearest = m; }
  });
  // tolerance ~15° of arc (~0.5 units on R=2 sphere)
  const useExisting = nearest && bestD < 0.5;

  // Remove old halo
  if (pulseHalo) {
    globe.remove(pulseHalo); pulseHalo.geometry.dispose(); pulseHalo.material.dispose(); pulseHalo = null;
  }
  // New halo at the right spot
  const haloGeo = new THREE.RingGeometry(0.02, 0.06, 32);
  const haloMat = new THREE.MeshBasicMaterial({ color: 0xF15B40, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  const haloPos = useExisting ? nearest.position.clone() : target;
  halo.position.copy(haloPos);
  halo.lookAt(haloPos.clone().multiplyScalar(2));
  halo.userData.born = performance.now();
  halo.userData.life = 2400;
  globe.add(halo);
  pulseHalo = halo;

  if (useExisting) {
    // Bounce the marker briefly via a simple scale-tween
    const m = nearest;
    const t0 = performance.now();
    function bounce(now) {
      const t = (now - t0) / 700;
      if (t > 1) { m.scale.setScalar(1); return; }
      const k = Math.sin(t * Math.PI);
      m.scale.setScalar(1 + k * 1.4);
      requestAnimationFrame(bounce);
    }
    requestAnimationFrame(bounce);
  }
}

// Hook into render loop: animate halo
const _origTickerInterval = setInterval; // (no-op, just to keep linters happy)
(function animateHalo(){
  function step() {
    if (pulseHalo) {
      const age = performance.now() - pulseHalo.userData.born;
      const k = age / pulseHalo.userData.life;
      if (k >= 1) {
        globe.remove(pulseHalo); pulseHalo.geometry.dispose(); pulseHalo.material.dispose(); pulseHalo = null;
      } else {
        pulseHalo.scale.setScalar(1 + k * 5);
        pulseHalo.material.opacity = 0.9 * (1 - k);
      }
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
})();

// ---------- RESIZE ----------
function resize() {
  const rect = canvas.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(canvas);
resize();
</script>
