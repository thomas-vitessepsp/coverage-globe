  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --dark-purple: #470A68;\n    --purple: #831FBF;\n    --vivid-purple: #B029FF;\n    --light-purple: #CF7FFF;\n    --pastel-purple: #B49EB5;\n    --warm-orange: #F15B40;\n    --light-orange: #FD9352;\n    --blue-green: #003342;\n    --off-white: #F5F5F5;\n    --black: #0A0A0A;\n\n    --bg-0: #FFFFFF;\n    --bg-1: #F5F5F5;\n    --ink: #0A0A0A;\n    --ink-soft: #470A68;\n    --line: rgba(10,10,10,0.10);\n    --line-strong: rgba(71,10,104,0.22);\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html, body {\n    background: var(--bg-0);\n    color: var(--ink);\n    font-family: 'Poppins', system-ui, -apple-system, sans-serif;\n    font-weight: 300;\n    letter-spacing: -0.01em;\n    overflow-x: hidden;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .stage {\n    position: relative;\n    width: 100%;\n    min-height: 100vh;\n    background:\n      radial-gradient(1200px 800px at 75% 20%, rgba(176,41,255,0.10), transparent 60%),\n      radial-gradient(900px 700px at 15% 80%, rgba(241,91,64,0.06), transparent 60%),\n      linear-gradient(180deg, #FFFFFF 0%, #FAF7FC 50%, #FFFFFF 100%);\n    overflow: hidden;\n  }\n\n  /* Top nav */\n  .topbar {\n    position: relative;\n    z-index: 5;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    padding: 28px 48px;\n  }\n  .logo img { height: 28px; display: block; }\n  .topbar-meta {\n    display: flex;\n    gap: 32px;\n    align-items: center;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    font-weight: 400;\n    text-transform: uppercase;\n    letter-spacing: 0.18em;\n    color: rgba(10,10,10,0.55);\n  }\n  .topbar-meta .dot {\n    display: inline-block;\n    width: 6px; height: 6px;\n    background: var(--warm-orange);\n    border-radius: 50%;\n    margin-right: 8px;\n    vertical-align: middle;\n    box-shadow: 0 0 12px var(--warm-orange);\n    animation: pulse 2s ease-in-out infinite;\n  }\n  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }\n\n  /* Hero */\n  .hero {\n    display: grid;\n    grid-template-columns: minmax(360px, 1fr) minmax(560px, 1.4fr);\n    gap: 32px;\n    padding: 24px 48px 64px;\n    align-items: center;\n    min-height: calc(100vh - 88px);\n    position: relative;\n  }\n\n  /* Globe canvas: full-bleed centered on the viewport. */\n  .globe-bg {\n    position: absolute;\n    top: 0;\n    bottom: 0;\n    left: 50%;\n    width: min(95vh, 95vw);\n    aspect-ratio: 1 / 1;\n    transform: translateX(-50%);\n    z-index: 1;\n    pointer-events: none;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n  .globe-bg #globe-canvas {\n    position: absolute;\n    inset: 0;\n    width: 100% !important;\n    height: 100% !important;\n    pointer-events: auto;\n    cursor: grab;\n  }\n  .globe-bg #globe-canvas:active { cursor: grabbing; }\n\n  .hero-copy { max-width: 520px; padding: 12px 0; position: relative; z-index: 5; }\n  .eyebrow {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 12px;\n    text-transform: uppercase;\n    letter-spacing: 0.22em;\n    color: var(--light-orange);\n    margin-bottom: 28px;\n    display: inline-flex;\n    align-items: center;\n    gap: 12px;\n  }\n  .eyebrow::before {\n    content: \"\"; width: 32px; height: 1px; background: var(--light-orange); display: inline-block;\n  }\n  h1 {\n    font-family: 'Poppins', sans-serif;\n    font-weight: 400;\n    font-size: clamp(40px, 5.2vw, 76px);\n    line-height: 0.98;\n    letter-spacing: -0.035em;\n    margin-bottom: 24px;\n    color: var(--ink);\n    text-wrap: balance;\n  }\n  h1 .accent { color: var(--warm-orange); font-weight: 700; font-style: italic; }\n  h1 .soft { color: rgba(10,10,10,0.45); font-weight: 300; }\n\n  .lede {\n    font-size: 17px;\n    line-height: 1.55;\n    color: rgba(10,10,10,0.72);\n    max-width: 460px;\n    margin-bottom: 36px;\n  }\n\n  .stat-row {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 1px;\n    background: var(--line);\n    border-top: 1px solid var(--line-strong);\n    border-bottom: 1px solid var(--line-strong);\n    margin-bottom: 28px;\n  }\n  .stat {\n    background: rgba(245,245,245,0.6);\n    padding: 18px 16px 16px;\n  }\n  .stat-num {\n    font-family: 'Poppins', sans-serif;\n    font-weight: 700;\n    font-size: 28px;\n    letter-spacing: -0.04em;\n    color: var(--dark-purple);\n    line-height: 1;\n    margin-bottom: 8px;\n  }\n  .stat-num em { color: var(--warm-orange); font-style: normal; }\n  .stat-label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    text-transform: uppercase;\n    letter-spacing: 0.16em;\n    color: rgba(10,10,10,0.55);\n  }\n\n  .entity-toggle {\n    display: flex;\n    background: rgba(245,245,245,0.7);\n    border: 1px solid var(--line-strong);\n    padding: 4px;\n    margin-bottom: 24px;\n    width: fit-content;\n  }\n  .entity-toggle button {\n    appearance: none;\n    background: transparent;\n    border: none;\n    color: rgba(10,10,10,0.6);\n    font-family: 'Poppins', sans-serif;\n    font-size: 13px;\n    font-weight: 500;\n    padding: 10px 18px;\n    cursor: pointer;\n    letter-spacing: -0.01em;\n    transition: all 0.25s ease;\n    display: flex;\n    align-items: center;\n    gap: 10px;\n  }\n  .entity-toggle button .swatch {\n    width: 10px; height: 10px;\n    border-radius: 50%;\n    background: rgba(255,255,255,0.2);\n  }\n  .entity-toggle button[data-entity=\"uk\"] .swatch { background: var(--vivid-purple); box-shadow: 0 0 10px rgba(176,41,255,0.6); }\n  .entity-toggle button[data-entity=\"us\"] .swatch { background: var(--warm-orange); box-shadow: 0 0 10px rgba(241,91,64,0.6); }\n  .entity-toggle button[data-entity=\"all\"] .swatch { background: var(--dark-purple); box-shadow: 0 0 10px rgba(71,10,104,0.4); }\n  .entity-toggle button.active {\n    background: var(--dark-purple);\n    color: var(--off-white);\n  }\n  .entity-toggle button:hover:not(.active) { color: var(--ink); }\n\n  .entity-meta {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: rgba(10,10,10,0.5);\n    line-height: 1.6;\n    text-transform: uppercase;\n    letter-spacing: 0.1em;\n  }\n  .entity-meta b { color: var(--dark-purple); font-weight: 500; }\n\n  /* Globe column — now just a positioning frame for HUD/legend overlays.\n     The actual canvas lives in .globe-bg behind everything. */\n  .globe-col {\n    position: relative;\n    height: min(82vh, 760px);\n    aspect-ratio: 1 / 1;\n    margin-left: auto;\n    margin-right: 0;\n    width: 100%;\n    max-width: 760px;\n    z-index: 3;\n    pointer-events: none;\n  }\n  .globe-col > * { pointer-events: auto; }\n  .globe-col .hex-deco { pointer-events: none; }\n\n  /* Hexagon corner decorations */\n  .hex-deco {\n    position: absolute;\n    pointer-events: none;\n    opacity: 0.18;\n    z-index: 1;\n  }\n  .hex-deco.tl { top: 0; left: 0; }\n  .hex-deco.br { bottom: 0; right: 0; transform: rotate(180deg); }\n\n  /* HUD overlay on globe */\n  .hud {\n    position: absolute;\n    pointer-events: none;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: rgba(10,10,10,0.45);\n    text-transform: uppercase;\n    letter-spacing: 0.18em;\n    z-index: 2;\n  }\n  .hud.tl { top: 18px; left: 18px; }\n  .hud.tr { top: 18px; right: 18px; text-align: right; }\n  .hud.bl { bottom: 18px; left: 18px; }\n  .hud.br { bottom: 18px; right: 18px; text-align: right; }\n  .hud .key { color: var(--dark-purple); }\n  .hud .row { line-height: 1.7; }\n  .hud .crosshair {\n    width: 12px; height: 12px;\n    border-left: 1px solid rgba(10,10,10,0.4);\n    border-top: 1px solid rgba(10,10,10,0.4);\n    position: absolute;\n  }\n  .hud.tl .crosshair { top: 0; left: 0; }\n\n  /* Hub tooltip */\n  .hub-tooltip {\n    position: absolute;\n    pointer-events: none;\n    background: rgba(255,255,255,0.96);\n    backdrop-filter: blur(10px);\n    -webkit-backdrop-filter: blur(10px);\n    border: 1px solid var(--line-strong);\n    box-shadow: 0 12px 40px rgba(71,10,104,0.15);\n    padding: 14px 16px;\n    min-width: 220px;\n    transform: translate(12px, -50%);\n    opacity: 0;\n    transition: opacity 0.18s ease;\n    z-index: 6;\n  }\n  .hub-tooltip.show { opacity: 1; }\n  .hub-tooltip::before {\n    content: \"\";\n    position: absolute;\n    left: -1px; top: -1px;\n    width: 8px; height: 8px;\n    border-left: 1px solid var(--warm-orange);\n    border-top: 1px solid var(--warm-orange);\n  }\n  .hub-tooltip::after {\n    content: \"\";\n    position: absolute;\n    right: -1px; bottom: -1px;\n    width: 8px; height: 8px;\n    border-right: 1px solid var(--warm-orange);\n    border-bottom: 1px solid var(--warm-orange);\n  }\n  .tooltip-tag {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: var(--warm-orange);\n    text-transform: uppercase;\n    letter-spacing: 0.15em;\n    margin-bottom: 4px;\n  }\n  .tooltip-tag.uk { color: var(--light-purple); }\n  .tooltip-name {\n    font-family: 'Poppins', sans-serif;\n    font-weight: 500;\n    font-size: 17px;\n    color: var(--dark-purple);\n    letter-spacing: -0.02em;\n    margin-bottom: 8px;\n  }\n  .tooltip-meta {\n    display: grid;\n    grid-template-columns: auto 1fr;\n    gap: 4px 12px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: rgba(10,10,10,0.55);\n    text-transform: uppercase;\n    letter-spacing: 0.1em;\n  }\n  .tooltip-meta b { color: var(--ink); font-weight: 500; }\n\n  /* Lower content */\n  .below {\n    position: relative;\n    z-index: 3;\n    padding: 0 48px 80px;\n  }\n  .pillars {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 0;\n    border-top: 1px solid var(--line-strong);\n  }\n  .pillar {\n    padding: 36px 32px 32px;\n    border-right: 1px solid var(--line);\n    position: relative;\n  }\n  .pillar:last-child { border-right: none; }\n  .pillar-num {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: var(--warm-orange);\n    letter-spacing: 0.2em;\n    margin-bottom: 20px;\n  }\n  .pillar h3 {\n    font-weight: 500;\n    font-size: 24px;\n    line-height: 1.15;\n    letter-spacing: -0.025em;\n    margin-bottom: 14px;\n    color: var(--dark-purple);\n  }\n  .pillar p {\n    font-size: 14px;\n    line-height: 1.6;\n    color: rgba(10,10,10,0.65);\n    margin-bottom: 20px;\n  }\n  .pillar-list {\n    list-style: none;\n    border-top: 1px solid var(--line);\n    padding-top: 16px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    color: rgba(10,10,10,0.55);\n  }\n  .pillar-list li {\n    padding: 6px 0;\n    display: flex;\n    justify-content: space-between;\n  }\n  .pillar-list li b { color: var(--ink); font-weight: 500; }\n\n  /* Footer strip */\n  .strip {\n    margin-top: 60px;\n    padding: 28px 48px;\n    border-top: 1px solid var(--line-strong);\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    flex-wrap: wrap;\n    gap: 16px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    text-transform: uppercase;\n    letter-spacing: 0.16em;\n    color: rgba(10,10,10,0.45);\n  }\n  .strip b { color: var(--dark-purple); font-weight: 500; }\n\n  /* Legend over globe */\n  .legend {\n    position: absolute;\n    left: 18px;\n    bottom: 18px;\n    z-index: 4;\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n    color: rgba(10,10,10,0.6);\n  }\n  .legend .row { display: flex; align-items: center; gap: 10px; }\n  .legend .swatch { width: 14px; height: 2px; }\n  .legend .swatch.uk { background: var(--vivid-purple); box-shadow: 0 0 8px rgba(176,41,255,0.7); }\n  .legend .swatch.us { background: var(--warm-orange); box-shadow: 0 0 8px rgba(241,91,64,0.7); }\n  .legend .dot { width: 10px; height: 10px; }\n  .legend .dot.hub-uk { background: var(--vivid-purple); border: 1px solid var(--off-white); border-radius: 50%; }\n  .legend .dot.hub-us { background: var(--warm-orange); border: 1px solid var(--off-white); border-radius: 50%; }\n  .legend .dot.dest { background: var(--dark-purple); border-radius: 50%; opacity: 0.7; }\n\n  /* Live ticker */\n  .ticker-wrap {\n    position: absolute;\n    /* Anchored to the globe's visual bottom-right.\n       Globe radius in screen space ≈ 33vh (camera fov 40°, distance 8.27, R=2). */\n    right: calc(50% - 33vh);\n    bottom: calc(50% - 33vh);\n    z-index: 4;\n    background: rgba(255,255,255,0.85);\n    border: 1px solid var(--line);\n    box-shadow: 0 12px 40px rgba(71,10,104,0.10);\n    padding: 10px 14px;\n    min-width: 240px;\n    backdrop-filter: blur(8px);\n    -webkit-backdrop-filter: blur(8px);\n  }\n  .ticker-head {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px;\n    text-transform: uppercase;\n    letter-spacing: 0.18em;\n    color: rgba(10,10,10,0.5);\n    margin-bottom: 6px;\n    display: flex;\n    justify-content: space-between;\n  }\n  .ticker-head .live { color: var(--warm-orange); }\n  .ticker-line {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: var(--ink);\n    line-height: 1.4;\n    letter-spacing: 0.02em;\n    min-height: 32px;\n  }\n  .ticker-line .arrow { color: var(--warm-orange); margin: 0 6px; }\n  .ticker-line .amt { color: var(--dark-purple); font-weight: 500; }\n\n  /* ==================== SEARCH BAR ==================== */\n  .search-shell {\n    position: absolute;\n    bottom: 28px;\n    left: 50%;\n    transform: translateX(-50%);\n    z-index: 8;\n    width: min(420px, calc(100vw - 96px));\n    pointer-events: auto;\n    /* Stack suggestions ABOVE the search box now that the shell sits at\n       the bottom of the viewport. */\n    display: flex;\n    flex-direction: column-reverse;\n  }\n  .search-box {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    padding: 10px 12px;\n    background: rgba(255,255,255,0.94);\n    border: 1px solid var(--line-strong);\n    box-shadow: 0 12px 40px rgba(71,10,104,0.12), 0 2px 8px rgba(71,10,104,0.06);\n    backdrop-filter: blur(14px);\n    -webkit-backdrop-filter: blur(14px);\n    transition: box-shadow 0.2s ease, border-color 0.2s ease;\n  }\n  .search-box:focus-within {\n    border-color: var(--vivid-purple);\n    box-shadow: 0 12px 44px rgba(176,41,255,0.22), 0 0 0 3px rgba(176,41,255,0.10);\n  }\n  .search-box::before {\n    content: \"\";\n    width: 8px; height: 8px;\n    border-left: 1px solid var(--warm-orange);\n    border-top: 1px solid var(--warm-orange);\n    position: absolute; left: -1px; top: -1px;\n  }\n  .search-icon {\n    width: 14px; height: 14px;\n    flex-shrink: 0;\n    color: var(--dark-purple);\n  }\n  .search-input {\n    flex: 1;\n    border: none;\n    outline: none;\n    background: transparent;\n    font-family: 'Poppins', sans-serif;\n    font-size: 12px;\n    min-width: 0;\n    font-weight: 400;\n    color: var(--ink);\n    letter-spacing: -0.01em;\n  }\n  .search-input::placeholder { color: rgba(10,10,10,0.42); }\n  .search-kbd {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px;\n    color: rgba(10,10,10,0.5);\n    border: 1px solid var(--line-strong);\n    padding: 2px 5px;\n    letter-spacing: 0.06em;\n    flex-shrink: 0;\n    background: rgba(245,245,245,0.6);\n  }\n  .search-tag {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: var(--warm-orange);\n    text-transform: uppercase;\n    letter-spacing: 0.16em;\n    flex-shrink: 0;\n  }\n\n  /* Suggestions dropdown */\n  .search-suggest {\n    /* Margin sits below the suggestions in DOM order, but column-reverse\n       puts the suggestions above the search box — so this gap appears\n       between the two as expected. */\n    margin-bottom: 8px;\n    background: rgba(255,255,255,0.97);\n    border: 1px solid var(--line-strong);\n    box-shadow: 0 18px 50px rgba(71,10,104,0.18);\n    backdrop-filter: blur(14px);\n    -webkit-backdrop-filter: blur(14px);\n    max-height: 360px;\n    overflow-y: auto;\n    display: none;\n  }\n  .search-shell.has-results .search-suggest { display: block; }\n  .suggest-section {\n    padding: 8px 0;\n    border-bottom: 1px solid var(--line);\n  }\n  .suggest-section:last-child { border-bottom: none; }\n  .suggest-head {\n    padding: 6px 16px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px;\n    text-transform: uppercase;\n    letter-spacing: 0.18em;\n    color: rgba(10,10,10,0.45);\n  }\n  .suggest-row {\n    padding: 9px 16px;\n    cursor: pointer;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    gap: 16px;\n    transition: background 0.12s ease;\n    font-size: 13px;\n  }\n  .suggest-row:hover, .suggest-row.active {\n    background: rgba(176,41,255,0.08);\n  }\n  .suggest-name {\n    color: var(--ink);\n    font-weight: 500;\n    letter-spacing: -0.01em;\n    overflow: hidden;\n    text-overflow: ellipsis;\n    white-space: nowrap;\n  }\n  .suggest-name mark {\n    background: rgba(241,91,64,0.18);\n    color: var(--warm-orange);\n    padding: 0 1px;\n  }\n  .suggest-meta {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: rgba(10,10,10,0.5);\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    flex-shrink: 0;\n  }\n  .suggest-empty {\n    padding: 24px 16px;\n    text-align: center;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    color: rgba(10,10,10,0.5);\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n  }\n\n  /* ==================== RESULT MODAL ==================== */\n  /* Backdrop kept for click-to-dismiss but invisible — the result card\n     is now docked, not a centered overlay, so we don't dim the globe. */\n  .modal-backdrop {\n    position: fixed;\n    inset: 0;\n    background: transparent;\n    z-index: 50;\n    opacity: 0;\n    pointer-events: none;\n    transition: opacity 0.32s ease;\n  }\n  .modal-backdrop.show { opacity: 1; pointer-events: auto; }\n  /* Result card: docks above the search bar at the bottom of the viewport.\n     Slides up on open; the search bar remains visible and usable below. */\n  .modal {\n    position: fixed;\n    left: 50%;\n    bottom: 92px; /* sits clear of the (now-shorter) search bar */\n    transform: translate(-50%, 24px);\n    width: min(560px, calc(100vw - 64px));\n    max-height: min(520px, calc(100vh - 180px));\n    background: #FFFFFF;\n    border: 1px solid var(--line-strong);\n    box-shadow: 0 24px 60px rgba(71,10,104,0.20), 0 6px 20px rgba(71,10,104,0.10);\n    z-index: 51;\n    overflow: hidden;\n    display: flex;\n    flex-direction: column;\n    opacity: 0;\n    pointer-events: none;\n    transition: transform 0.36s cubic-bezier(.2,.8,.2,1), opacity 0.32s ease;\n  }\n  .modal.show {\n    transform: translate(-50%, 0);\n    opacity: 1;\n    pointer-events: auto;\n  }\n  /* Brand corner ticks */\n  .modal::before, .modal::after {\n    content: \"\";\n    position: absolute;\n    width: 14px; height: 14px;\n    z-index: 2;\n  }\n  .modal::before {\n    top: 0; left: 0;\n    border-left: 1px solid var(--warm-orange);\n    border-top: 1px solid var(--warm-orange);\n  }\n  .modal::after {\n    bottom: 0; right: 0;\n    border-right: 1px solid var(--warm-orange);\n    border-bottom: 1px solid var(--warm-orange);\n  }\n\n  .modal-head {\n    padding: 16px 18px 14px;\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-start;\n    gap: 12px;\n    border-bottom: 1px solid var(--line);\n    background:\n      radial-gradient(600px 200px at 90% 0%, rgba(176,41,255,0.10), transparent 60%),\n      linear-gradient(180deg, #FBF7FE 0%, #FFFFFF 100%);\n  }\n  .modal-tag {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 8px;\n    text-transform: uppercase;\n    letter-spacing: 0.2em;\n    color: var(--warm-orange);\n    margin-bottom: 6px;\n  }\n  .modal-title {\n    font-family: 'Poppins', sans-serif;\n    font-weight: 500;\n    font-size: 20px;\n    letter-spacing: -0.03em;\n    color: var(--dark-purple);\n    line-height: 1.05;\n    margin-bottom: 6px;\n  }\n  .modal-title .iso {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    color: var(--vivid-purple);\n    margin-left: 8px;\n    font-weight: 500;\n    letter-spacing: 0.1em;\n    vertical-align: middle;\n  }\n  .modal-sub {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 9px;\n    color: rgba(10,10,10,0.55);\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n  }\n  .modal-close {\n    appearance: none;\n    background: transparent;\n    border: 1px solid var(--line-strong);\n    width: 24px; height: 24px;\n    cursor: pointer;\n    color: var(--dark-purple);\n    flex-shrink: 0;\n    transition: background 0.18s ease;\n    display: grid; place-items: center;\n  }\n  .modal-close:hover { background: rgba(176,41,255,0.10); }\n\n  .modal-body {\n    padding: 16px 18px 18px;\n    overflow-y: auto;\n    flex: 1;\n    font-size: 11px;\n  }\n\n  /* hub badges */\n  .hub-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 8px;\n    margin-bottom: 14px;\n  }\n  .hub-grid.single { grid-template-columns: 1fr; }\n  .hub-card {\n    border: 1px solid var(--line);\n    padding: 10px 12px 10px;\n    position: relative;\n    background: rgba(245,245,245,0.4);\n    transition: all 0.2s ease;\n  }\n  .hub-card.preferred {\n    border-color: var(--vivid-purple);\n    background: rgba(176,41,255,0.04);\n    box-shadow: 0 0 0 1px rgba(176,41,255,0.15);\n  }\n  .hub-card.preferred .hub-card-title { color: var(--dark-purple); }\n  .hub-card.preferred::after {\n    content: \"PREFERRED\";\n    position: absolute; top: 8px; right: 10px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 7px;\n    color: var(--warm-orange);\n    letter-spacing: 0.16em;\n  }\n  .hub-card.dim { opacity: 0.55; }\n  .hub-card-tag {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 8px;\n    text-transform: uppercase;\n    letter-spacing: 0.16em;\n    margin-bottom: 4px;\n  }\n  .hub-card.uk .hub-card-tag { color: var(--vivid-purple); }\n  .hub-card.us .hub-card-tag { color: var(--warm-orange); }\n  .hub-card-title {\n    font-family: 'Poppins', sans-serif;\n    font-weight: 500;\n    font-size: 13px;\n    color: var(--dark-purple);\n    letter-spacing: -0.015em;\n    margin-bottom: 6px;\n  }\n  /* Hub-card .uk / .us re-tint to keep brand cue without the small tag */\n  .hub-card.us .hub-card-title { color: var(--ink); }\n  .chip-sub {\n    color: rgba(10,10,10,0.55);\n    font-weight: 400;\n    margin-left: 4px;\n  }\n  .hub-card-sub {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 8px;\n    color: rgba(10,10,10,0.55);\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    margin-bottom: 6px;\n  }\n  .hub-card-na {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 8px;\n    color: rgba(10,10,10,0.4);\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n    padding: 4px 0;\n  }\n  /* SLA pill */\n  .sla {\n    display: inline-flex;\n    align-items: center;\n    gap: 5px;\n    padding: 3px 7px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 8px;\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    border: 1px solid currentColor;\n  }\n  .sla::before {\n    content: \"\";\n    width: 5px; height: 5px; border-radius: 50%;\n    background: currentColor;\n  }\n  .sla.real-time { color: var(--warm-orange); }\n  .sla.same-day  { color: var(--vivid-purple); }\n  .sla.next-day  { color: var(--dark-purple); }\n  .sla.two-day   { color: rgba(10,10,10,0.6); }\n  .sla.unknown   { color: rgba(10,10,10,0.45); }\n\n  /* detail rows */\n  .detail-row {\n    display: grid;\n    grid-template-columns: 78px 1fr;\n    gap: 8px;\n    padding: 7px 0;\n    border-top: 1px solid var(--line);\n    align-items: start;\n    font-size: 11px;\n  }\n  .detail-row:first-child { border-top: none; }\n  .detail-row .k {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 8px;\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n    color: rgba(10,10,10,0.5);\n    padding-top: 2px;\n  }\n  .detail-row .v {\n    color: var(--ink);\n    line-height: 1.5;\n  }\n  .chip-list { display: flex; flex-wrap: wrap; gap: 4px; }\n  .chip {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 8px;\n    text-transform: uppercase;\n    letter-spacing: 0.1em;\n    padding: 3px 6px;\n    border: 1px solid var(--line-strong);\n    background: rgba(255,255,255,0.7);\n    color: var(--ink);\n  }\n  .chip.scheme { color: var(--dark-purple); border-color: rgba(71,10,104,0.30); }\n  .chip.payout { color: var(--ink); }\n\n  .why-block {\n    margin-top: 14px;\n    padding: 10px 12px;\n    background: rgba(176,41,255,0.05);\n    border-left: 2px solid var(--vivid-purple);\n    font-size: 11px;\n    line-height: 1.5;\n    color: rgba(10,10,10,0.78);\n  }\n  .why-block .label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 8px;\n    color: var(--vivid-purple);\n    text-transform: uppercase;\n    letter-spacing: 0.18em;\n    margin-bottom: 5px;\n    display: block;\n  }\n\n  /* fallback (SWIFT) */\n  .fallback-block {\n    padding: 16px;\n    border: 1px dashed var(--line-strong);\n    background: rgba(245,245,245,0.5);\n    text-align: center;\n  }\n  .fallback-block h4 {\n    font-weight: 500;\n    font-size: 13px;\n    color: var(--dark-purple);\n    margin-bottom: 4px;\n    letter-spacing: -0.02em;\n  }\n  .fallback-block p {\n    font-size: 11px;\n    color: rgba(10,10,10,0.65);\n    line-height: 1.5;\n    max-width: 100%;\n    margin: 0 auto;\n  }\n\n  /* currency view */\n  .ccy-stat-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 0;\n    margin-bottom: 14px;\n    border-top: 1px solid var(--line-strong);\n    border-bottom: 1px solid var(--line-strong);\n  }\n  .ccy-stat {\n    padding: 10px 8px 8px;\n    border-right: 1px solid var(--line);\n  }\n  .ccy-stat:last-child { border-right: none; }\n  .ccy-stat-num {\n    font-weight: 600;\n    font-size: 18px;\n    letter-spacing: -0.03em;\n    color: var(--dark-purple);\n    line-height: 1;\n    margin-bottom: 4px;\n  }\n  .ccy-stat-num em { color: var(--warm-orange); font-style: normal; }\n  .ccy-stat-label {\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 8px;\n    color: rgba(10,10,10,0.55);\n    text-transform: uppercase;\n    letter-spacing: 0.13em;\n  }\n\n  .dest-list-toggle {\n    appearance: none;\n    background: transparent;\n    border: 1px solid var(--line-strong);\n    padding: 6px 10px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 8px;\n    text-transform: uppercase;\n    letter-spacing: 0.14em;\n    color: var(--dark-purple);\n    cursor: pointer;\n    width: 100%;\n    text-align: left;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    transition: background 0.18s ease;\n  }\n  .dest-list-toggle:hover { background: rgba(176,41,255,0.05); }\n  .dest-list-toggle .arr { transition: transform 0.2s ease; }\n  .dest-list-toggle.open .arr { transform: rotate(90deg); }\n  .dest-list {\n    display: none;\n    margin-top: 12px;\n    padding: 14px 16px;\n    background: rgba(245,245,245,0.5);\n    border: 1px solid var(--line);\n    columns: 3;\n    column-gap: 24px;\n    font-size: 12px;\n    color: var(--ink);\n    line-height: 1.7;\n  }\n  .dest-list.open { display: block; }\n  .dest-list span {\n    display: block;\n    padding: 1px 0;\n    cursor: pointer;\n    transition: color 0.15s ease;\n    break-inside: avoid;\n  }\n  .dest-list span:hover { color: var(--warm-orange); }\n\n  /* Highlight pulse on globe-selected destination */\n  /* (handled in shaders/JS) */\n\n  @media (max-width: 480px) {\n    .hub-grid { grid-template-columns: 1fr; }\n  }\n  @media (max-width: 760px) {\n    .modal-head { padding: 14px 14px 12px; }\n    .modal-body { padding: 14px; }\n    .modal-title { font-size: 18px; }\n    .hub-grid { grid-template-columns: 1fr 1fr; }\n    .ccy-stat-grid { grid-template-columns: 1fr; }\n    .ccy-stat { border-right: none; border-bottom: 1px solid var(--line); }\n    .dest-list { columns: 1; }\n  }\n\n  @media (max-width: 1100px) {\n    .hero { grid-template-columns: 1fr; padding: 16px 24px 40px; }\n    .globe-col { max-width: 640px; margin: 0 auto; height: min(70vh, 640px); }\n    .below { padding: 0 24px 60px; }\n    .pillars { grid-template-columns: 1fr; }\n    .pillar { border-right: none; border-bottom: 1px solid var(--line); }\n    .pillar:last-child { border-bottom: none; }\n    .topbar { padding: 20px 24px; }\n    .topbar-meta { display: none; }\n    .strip { padding: 22px 24px; }\n  }\n  @media (max-width: 600px) {\n    h1 { font-size: 40px; }\n    .stat-row { grid-template-columns: 1fr; }\n    .ticker-wrap { display: none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"stage\">\n\n  <!-- Full-bleed globe canvas (the only visual layer) -->\n  <div class=\"globe-bg\"><canvas id=\"globe-canvas\"><\u002Fcanvas><\u002Fdiv>\n\n  <!-- Floating search bar -->\n  <div class=\"search-shell\" id=\"search-shell\">\n    <div class=\"search-box\">\n      <svg class=\"search-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\n        <circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"><\u002Fline>\n      <\u002Fsvg>\n      <input type=\"text\" class=\"search-input\" id=\"search-input\" placeholder=\"Search for a country to see supported methods\" autocomplete=\"off\" spellcheck=\"false\">\n    <\u002Fdiv>\n    <div class=\"search-suggest\" id=\"search-suggest\" role=\"listbox\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Live payment ticker -->\n  <div class=\"ticker-wrap\">\n    <div class=\"ticker-head\"><span>LIVE PAYMENT FLOW<\u002Fspan><span class=\"live\">● REAL‑TIME<\u002Fspan><\u002Fdiv>\n    <div class=\"ticker-line\" id=\"ticker-line\">London <span class=\"arrow\">→<\u002Fspan> Sydney<br><span class=\"amt\">£42,180.00<\u002Fspan> · GBP→AUD<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Hub tooltip (rendered via JS on hub hover) -->\n  <div class=\"hub-tooltip\" id=\"hub-tooltip\">\n    <div class=\"tooltip-tag\" id=\"t-tag\">HUB<\u002Fdiv>\n    <div class=\"tooltip-name\" id=\"t-name\">—<\u002Fdiv>\n    <div class=\"tooltip-meta\" id=\"t-meta\"><\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- Result modal (country / currency detail) -->\n<div class=\"modal-backdrop\" id=\"modal-backdrop\" aria-hidden=\"true\"><\u002Fdiv>\n<aside class=\"modal\" id=\"modal\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"modal-title\" aria-hidden=\"true\">\n  <header class=\"modal-head\">\n    <div>\n      <div class=\"modal-tag\" id=\"modal-tag\">DESTINATION COVERAGE<\u002Fdiv>\n      <h2 class=\"modal-title\" id=\"modal-title\">—<\u002Fh2>\n      <div class=\"modal-sub\" id=\"modal-sub\">—<\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"modal-close\" id=\"modal-close\" aria-label=\"Close\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><line x1=\"2\" y1=\"2\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"2\" x2=\"2\" y2=\"12\"><\u002Fline><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fheader>\n  <div class=\"modal-body\" id=\"modal-body\">—<\u002Fdiv>\n<\u002Faside>\n\n<script>\n// ---------- DATA LOADER ----------\n// Single source of truth: payment-options.json. We fetch it, then build a\n// VData object that the rest of the app consumes. No coverage-data.js.\nwindow.VitesseDataReady = (async () => {\n  const resp = await fetch('payment-options.json', { cache: 'no-cache' });\n  if (!resp.ok) throw new Error('payment-options.json failed: ' + resp.status);\n  const raw = await resp.json();\n\n  // Build country index keyed by display name. Methods are also split by\n  // hub so the country card can render UK / US columns.\n  const countries = {};\n  raw.countries.forEach(c => {\n    const all = c.paymentMethods || [];\n    const byHub = { uk: [], us: [] };\n    all.forEach(pm => {\n      const hubs = pm.hubs || ['uk', 'us'];\n      hubs.forEach(h => { if (byHub[h]) byHub[h].push(pm); });\n    });\n    countries[c.country] = {\n      name: c.country,\n      iso2: c.iso2, iso3: c.iso3,\n      lat: c.lat, lon: c.lon,\n      ccy: c.currency, region: c.region,\n      paymentMethods: all,\n      ukMethods: byHub.uk,\n      usMethods: byHub.us,\n    };\n  });\n\n  // Currency index — group countries by currency\n  const currencies = {};\n  raw.countries.forEach(c => {\n    const code = c.currency;\n    if (!currencies[code]) {\n      currencies[code] = { code, name: code, countries: [] };\n    }\n    currencies[code].countries.push(c.country);\n  });\n\n  // Scheme reverse index — every Domestic Bank Transfer scheme → countries[]\n  const schemes = {};\n  raw.countries.forEach(c => {\n    (c.paymentMethods || []).forEach(pm => {\n      if (pm.type !== 'Domestic Bank Transfer') return;\n      (pm.schemes || []).forEach(s => {\n        if (!schemes[s]) schemes[s] = { name: s, countries: [] };\n        schemes[s].countries.push(c.country);\n      });\n    });\n  });\n\n  const data = { countries, currencies, schemes, regions: raw.regions || [] };\n  window.VitesseData = data;\n  // Notify listeners (the globe code below picks this up)\n  window.dispatchEvent(new CustomEvent('vitesse-data-ready', { detail: data }));\n  return data;\n})().catch(err => {\n  console.error('[vitesse] data load failed', err);\n  return { countries: {}, currencies: {}, schemes: {}, regions: [] };\n});\n<\u002Fscript>\n\n<script src=\"80f49b60-d29f-47b1-9ffe-a89bd92a36bb\"><\u002Fscript>\n\n<script type=\"importmap\">\n{\n  \"imports\": {\n    \"three\": \"https://unpkg.com/three@0.160.0/build/three.module.js\"\n  }\n}\n<\u002Fscript>\n\n<script type=\"module\">\nimport * as THREE from 'three';\n\n// ---------- DATA ----------\nconst HUBS = [\n  { id: 'uk', name: 'UK Hub', city: 'London', entity: 'Vitesse PSP Ltd', regulator: 'FCA · DNB',\n    lat: 51.5074, lon: -0.1278, color: 0xB029FF, currencies: 'GBP · EUR · USD' },\n  { id: 'us', name: 'US Hub', city: 'New York',  entity: 'Vitesse Trust Company, LLC', regulator: 'NYDFS',\n    lat: 40.7128, lon: -74.0060, color: 0xF15B40, currencies: 'USD' },\n];\n\n// Destination cities — 500 cities across all 144 supported countries.\n// Loaded from cities-500.js (see <script src> in head).\n// Each entry: { name, lat, lon, country, region: 'us'|'eu'|'rest', via: 'us'|'uk'|'both' }.\n// `region` drives hub→destination traffic-mix weighting.\n// `via` controls which hub(s) can route to this destination.\nconst DESTS = window.__DESTS_500 || [];\n\n// ---------- SETUP ----------\nconst canvas = document.getElementById('globe-canvas');\nconst renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });\nrenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n\nconst scene = new THREE.Scene();\nconst camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);\n// Pull camera back to ~1/0.75x so globe appears at ~75% of previous scale\ncamera.position.set(0, 0, 8.27);\n\n// Lighting (white-mode: tighter contrast, less colored cast)\nscene.add(new THREE.AmbientLight(0xffffff, 0.85));\nconst keyLight = new THREE.DirectionalLight(0xffffff, 0.55);\nkeyLight.position.set(-3, 2, 4);\nscene.add(keyLight);\nconst rim = new THREE.DirectionalLight(0x831fbf, 0.35);\nrim.position.set(3, -1, -2);\nscene.add(rim);\n\n// Globe rig: outer tilt group (camera-style pitch) wraps inner spin group\n// (rotates around true vertical Y axis). This keeps the north pole pinned\n// to the top of the screen no matter how much the user spins.\nconst globeTilt = new THREE.Group();\nscene.add(globeTilt);\nconst globe = new THREE.Group();\nglobeTilt.add(globe);\n// Slight forward tilt so the northern hemisphere reads naturally.\n// Defined as a single source of truth so resetView() returns to the same pose.\nconst BASE_TILT_X = 0.32 + (10 * Math.PI / 180); // ~28° forward\nglobeTilt.rotation.x = BASE_TILT_X;\n\nconst RADIUS = 2;\n\n// Sphere base (off-white with slight purple wash so dots read clearly)\nconst sphereGeo = new THREE.SphereGeometry(RADIUS, 64, 64);\nconst sphereMat = new THREE.MeshPhongMaterial({\n  color: 0xF7F4FA,\n  emissive: 0xEFE9F4,\n  shininess: 4,\n  specular: 0xCFBFE0,\n  transparent: true,\n  opacity: 1.0,\n});\nconst sphere = new THREE.Mesh(sphereGeo, sphereMat);\nglobe.add(sphere);\n\n// Atmosphere glow (back-side rim)\nconst atmoGeo = new THREE.SphereGeometry(RADIUS * 1.06, 64, 64);\nconst atmoMat = new THREE.ShaderMaterial({\n  vertexShader: `\n    varying vec3 vNormal;\n    void main() {\n      vNormal = normalize(normalMatrix * normal);\n      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);\n    }`,\n  fragmentShader: `\n    varying vec3 vNormal;\n    void main() {\n      float intensity = pow(0.55 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.4);\n      vec3 colA = vec3(0.51, 0.12, 0.75);  // purple\n      vec3 colB = vec3(0.95, 0.36, 0.25);  // warm orange\n      vec3 col = mix(colA, colB, 0.30);\n      gl_FragColor = vec4(col, 1.0) * intensity * 0.5;\n    }`,\n  blending: THREE.AdditiveBlending,\n  side: THREE.BackSide,\n  transparent: true,\n});\nconst atmosphere = new THREE.Mesh(atmoGeo, atmoMat);\nscene.add(atmosphere);\n\n// Lat/lon graticule\nfunction makeGraticule() {\n  const grp = new THREE.Group();\n  const mat = new THREE.LineBasicMaterial({ color: 0xCFBFE0, transparent: true, opacity: 0.55 });\n  // parallels\n  for (let lat = -75; lat <= 75; lat += 15) {\n    const pts = [];\n    const phi = (90 - lat) * Math.PI / 180;\n    for (let lon = 0; lon <= 360; lon += 4) {\n      const theta = lon * Math.PI / 180;\n      pts.push(new THREE.Vector3(\n        RADIUS * 1.001 * Math.sin(phi) * Math.cos(theta),\n        RADIUS * 1.001 * Math.cos(phi),\n        -RADIUS * 1.001 * Math.sin(phi) * Math.sin(theta),\n      ));\n    }\n    const g = new THREE.BufferGeometry().setFromPoints(pts);\n    grp.add(new THREE.Line(g, mat));\n  }\n  // meridians\n  for (let lon = 0; lon < 360; lon += 15) {\n    const pts = [];\n    const theta = lon * Math.PI / 180;\n    for (let lat = -90; lat <= 90; lat += 4) {\n      const phi = (90 - lat) * Math.PI / 180;\n      pts.push(new THREE.Vector3(\n        RADIUS * 1.001 * Math.sin(phi) * Math.cos(theta),\n        RADIUS * 1.001 * Math.cos(phi),\n        -RADIUS * 1.001 * Math.sin(phi) * Math.sin(theta),\n      ));\n    }\n    const g = new THREE.BufferGeometry().setFromPoints(pts);\n    grp.add(new THREE.Line(g, mat));\n  }\n  return grp;\n}\nglobe.add(makeGraticule());\n\n// Continent dot-grid (procedural, no external textures)\n// We render a sphere of small dots and only show those over land using a simple\n// equirectangular landmask drawn from a low-res polygon set encoded as bitmap.\n// To keep the file standalone, we use a small bundled landmask: a 360x180 grid\n// derived from coarse country outlines. We approximate via mathematical land tests\n// using a base map texture generated procedurally from an embedded outline.\n//\n// Approach: use an offscreen canvas to draw a stylized world map (continents as\n// hexagonal-tinted shapes) then sample it.\nfunction makeLandmaskCanvas() {\n  const W = 720, H = 360;\n  const c = document.createElement('canvas');\n  c.width = W; c.height = H;\n  const ctx = c.getContext('2d');\n  ctx.fillStyle = '#000';\n  ctx.fillRect(0,0,W,H);\n  // Draw continents as filled white polygons (lon, lat) -> (x,y) equirect\n  const proj = (lon, lat) => [ ((lon + 180) / 360) * W, ((90 - lat) / 180) * H ];\n  const drawPoly = (pts) => {\n    ctx.beginPath();\n    pts.forEach(([lon,lat], i) => {\n      const [x,y] = proj(lon,lat);\n      if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);\n    });\n    ctx.closePath();\n    ctx.fill();\n  };\n  ctx.fillStyle = '#fff';\n\n  // Coarse continent outlines (lon, lat)\n  // North America (incl. Mexico down to the Guatemala border)\n  drawPoly([\n    [-168,66],[-160,70],[-141,70],[-128,70],[-95,72],[-82,74],[-68,68],[-58,52],\n    [-65,45],[-72,42],[-76,38],[-80,32],[-81,25],[-83,24],[-87,21],[-90,21],\n    [-92,18],     // Yucatán north\n    [-88,15.5],   // Belize / Guatemala border\n    [-92,15],     // Guatemala Pacific\n    [-95,16],[-100,17],[-105,20],[-109,23],[-110,26],[-114,28],[-117,32],\n    [-123,38],[-125,48],[-132,55],[-150,60],[-165,60],[-168,66]\n  ]);\n  // Central America (Guatemala → Panama isthmus)\n  drawPoly([\n    [-92,15],[-88,15.5],[-86,15],[-83,11],[-80,9],[-77,8.5],[-77,7.5],\n    [-79,8],[-82,8],[-85,11],[-89,13],[-92,14],[-92,15]\n  ]);\n  // South America\n  drawPoly([[-81,11],[-76,8],[-66,11],[-60,5],[-52,5],[-48,0],[-43,-7],[-39,-13],[-39,-23],[-48,-26],[-58,-34],[-58,-39],[-66,-43],[-72,-52],[-71,-55],[-67,-55],[-66,-46],[-71,-32],[-72,-18],[-78,-8],[-81,-2],[-79,3],[-81,11]]);\n  // Europe — single contiguous polygon covering Iberia, France, the Low\n  // Countries, Germany, the Nordic peninsula and Eastern Europe down to\n  // the northern Mediterranean. Italy / Balkans / Greece are handled by\n  // the southern polygon below; the two polygons overlap inland so there\n  // is no seam.\n  drawPoly([\n    // Gibraltar → Atlantic Iberia → Bay of Biscay → Brittany\n    [-5.5,36],[-9,37],[-9.5,39],[-9,41],[-9,43.5],\n    [-2,43.5],[-1.5,46],[-4,48],[-5,48.5],[-2,49],\n    // Chann n  m.position.copy(pos);\n  // arrivals = list of in-flight payments currently in their post-landing\n  // fade phase for this destination. Drives bullet visibility/opacity/color.\n  m.userData = { dest, type: 'dest', arrivals: [] };\n  m.visible = false;\n  globe.add(m);\n  destMeshes.push(m);\n  destByName.set(dest.name, m);\n  return m;\n}\n\nHUBS.forEach(makeHubMarker);\nDESTS.forEach(makeDestMarker);\n\n// Arc routes from each hub to each destination of same `via`\nconst routeGroup = new THREE.Group();\nglobe.add(routeGroup);\n\n// One-shot payment animation: head sweeps to the destination, then tail\n// follows. When tail reaches the destination, the line is disposed.\n//   Phase A  head leads, tail at hub        → segment grows\n//   Phase B  both advance at same speed     → segment slides\n//   Phase C  head at destination, tail moves → segment shrinks\nfunction spawnPayment(from, to, color) {\n  const v1 = latLonToVec3(from.lat, from.lon, RADIUS);\n  const v2 = latLonToVec3(to.lat, to.lon, RADIUS);\n  const distance = v1.distanceTo(v2);\n  // Composite arc: smooth ascent → high cruise → smooth descent.\n  // Built by sampling along the great-circle (slerp) and modulating altitude\n  // with a profile that ramps up quickly, holds high in the middle, and\n  // ramps back down. Avoids any below-surface dip on long paths.\n  const angle = v1.angleTo(v2);\n  // Cruise altitude: low and roughly constant — paths hug the globe.\n  const cruise = THREE.MathUtils.clamp(distance * 0.04, 0.015, 0.06);\n  // Ramp distance (fraction of arc) — longer arcs ramp over a smaller fraction\n  // because in absolute angle the ramp can stay short and steep.\n  const rampFrac = THREE.MathUtils.clamp(0.6 / Math.max(angle, 0.01), 0.08, 0.45);\n  const N = 64;\n  const samplePts = new Array(N + 1);\n  // Great-circle direction: rotate v1 around the axis perp to (v1, v2)\n  const axis = new THREE.Vector3().crossVectors(v1, v2).normalize();\n  const v1n = v1.clone().normalize();\n  for r).\n  const country = VData?.countries?.[CITY_TO_COUNTRY?.[to.name]];\n  const slaMult = (country && isRealtimeCountry?.(country)) ? 2.0 : 1.0;\n\n  const payment = {\n    line,\n    via: from.id,\n    curve,\n    curveLen,\n    sampled,\n    segSamples: SEG_SAMPLES,\n    speed: baseSpeed * slaMult,\n    // phaseT 0→1 = head outbound (tail anchored at hub).\n    // phaseT 1→2 = tail catches up (head anchored at destination).\n    phaseT: 0,\n    headArrived: false,\n    dest: to,\n    hubColor: color,\n  };\n  payments.push(payment);\n  return payment;\n}\n\n// Active in-flight payments; updated each frame and culled when done.\nconst payments = [];\n\n// Fill a payment line's position buffer with the [a,b] slice of its curve.\n// Shared by phase-1 (growing segment) and phase-2 (full path during fade).\nfunction writeArcSegment(ln, p, a, b) {\n  const samples = p.sampled;\n  const N = p.segSamples;\n  const posAttr = ln.geometry.attributes.position;\n  const arr = posAttr.array;\n  let w = 0;\n\n  const pStart = p.curve.getPoint(a);\n  arr[w++] = pStart.x; arr[w++] = pStart.y; arr[w++] = pStart.z;\n\n  const iStart = Math.ceil(a * N) + (a * N === Math.ceil(a * N) ? 1 : 0);\n  const iEnd = Math.floor(b * N) - (b * N === Math.floor(b * N) ? 1 : 0);\n  for (let k = iStart; k <= iEnd; k++) {\n    if (k < 0 || k > N) continue;\n    const sp = samples[k];\n    arr[w++] = sp.x; arr[w++] = sp.y; arr[w++] = sp.z;\n  }\n\n  const pEnd = p.curve.getPoint(b);\n  arr[w++] = pEnd.x; arr[w++] = pEnd.y; arr[w++] = pEnd.z;\n\n  posAttr.needsUpdate = true;\n  ln.geometry.setDrawRange(0, w / 3);\n  ln.geometry.computeBoundingSphere();\n}\n\n// ---------- LOCAL RAILS ----------\n// When a traveler reaches its destination, spawn a small cluster of short\n// arcs radiating across local territory to suggest in-country payment rails.\n// Subtle, secondary palette (light orange / pastel purple).\nconst localGroup = new THREE.Group();\nglobe.add(localGroup);\nconst localBursts = []; // {lines:[{line, len, born}], born, life}\n\nfunction spawnLocalRails(dest, viaId) {\n  const center = latLonToVec3(dest.lat, dest.lon, RADIUS);\n  const count = 1; // single local rail per delivery\n  const baseColor = viaId === 'uk' ? 0x831FBF : 0xF15B40; // purple / warm orange\n  const burst = { lines: [], born: performance.now(), life: 1800, viaId };\n\n  for (let i = 0; i < count; i++) {\n    // Try up to 12 candidate endpoints; only keep ones that fall on land so\n    // local rails don't reach into oceans / off-island.\n    let endLat = dest.lat, endLon = dest.lon, found = false;\n    for (let attempt = 0; attempt < 12; attempt++) {\n      const angle = Math.random() * Math.PI * 2;\n      // Shrink reach with each failed attempt so islands still get a few rails\n      const reach = (0.5 + Math.random() * 2.2) * (1 - attempt * 0.06);\n      const dLat = Math.sin(angle) * reach;\n      const dLon = Math.cos(angle) * reach / Math.max(Math.cos(dest.lat * Math.PI/180), 0.25);\n      const cLat = THREE.MathUtils.clamp(dest.lat + dLat, -85, 85);\n      const cLon = dest.lon + dLon;\n      // Also sample the midpoint — ensures the arc itself stays over land\n      const midLat = (dest.lat + cLat) / 2;\n      const midLon = (dest.lon + cLon) / 2;\n      if (isLand(cLat, cLon) && isLand(midLat, midLon)) {\n        endLat = cLat; endLon = cLon; found = true; break;\n      }\n    }\n    if (!found) continue; // skip this rail rather than draw into the ocean\n    const v2 = latLonToVec3(endLat, endLon, RADIUS);\n\n    // Low, hugging arc — barely lifted above the surface\n    const mid = center.clone().add(v2).multiplyScalar(0.5).normalize().multiplyScalar(RADIUS + 0.04);\n    const curve = new THREE.QuadraticBezierCurve3(center.clone().multiplyScalar(RADIUS / center.length() * 1.002), mid, v2.clone().multiplyScalar(RADIUS / v2.length() * 1.002));\n    const pts = curve.getPoints(24);\n    const geo = new THREE.BufferGeometry().setFromPoints(pts);\n    const mat = new THREE.LineBasicMaterial({ color: baseColor, transparent: true, opacity: 0 });\n    const line = new THREE.Line(geo, mat);\n    line.userData = { viaId };\n    localGroup.add(line);\n\n    // Tiny end-dot (the \"delivered\" pin)\n    const dotGeo = new THREE.SphereGeometry(0.012, 8, 8);\n    const dotMat = new THREE.MeshBasicMaterial({ color: baseColor, transparent: true, opacity: 0 });\n    const dot = new THREE.Mesh(dotGeo, dotMat);\n    dot.position.copy(v2);\n    dot.userData = { viaId };\n    localGroup.add(dot);\n\n    burst.lines.push({ line, dot, delay: i * 90 });\n  }\n  localBursts.push(burst);\n\n  // Cap pool to avoid runaway memory\n  if (localBursts.length > 60) {\n    const old = localBursts.shift();\n    old.lines.forEach(({ line, dot }) => {\n      localGroup.remove(line); line.geometry.dispose(); line.material.dispose();\n      localGroup.remove(dot);  dot.geometry.dispose();  dot.material.dispose();\n    });\n  }\n}\n\nfunction updateLocalBursts(now) {\n  for (let bi = localBursts.length - 1; bi >= 0; bi--) {\n    const b = localBursts[bi];\n    const visible = (activeEntity === 'all' || activeEntity === b.viaId);\n    let allDead = true;\n    b.lines.forEach(({ line, dot, delay }) => {\n      const age = now - b.born - delay;\n      if (age < 0) { line.material.opacity = 0; dot.material.opacity = 0; allDead = false; return; }\n      const k = age / b.life;\n      if (k < 1) allDead = false;\n      // Fade in then out, peak around k=0.35\n      const env = k < 0.35 ? (k / 0.35) : Math.max(0, 1 - (k - 0.35) / 0.65);\n      const op = visible ? env * 0.75 : 0;\n      line.material.opacity = op;\n      dot.material.opacity  = visible ? env * 0.95 : 0;\n    });\n    if (allDead) {\n      b.lines.forEach(({ line, dot }) => {\n        localGroup.remove(line); line.geometry.dispose(); line.material.dispose();\n        localGroup.remove(dot);  dot.geometry.dispose();  dot.material.dispose();\n      });\n      localBursts.splice(bi, 1);\n    }\n  }\n}\n\n// ---------- TRAFFIC GENERATOR ----------\n// Each hub fires payments at PAYMENTS_PER_SEC. Destinations are picked by\n// region weight:\n//   UK hub  → 50% US cities, 30% Europe, 20% rest\n//   US hub  → 80% US cities, 20% rest of supported destinations\nconst PAYMENTS_PER_SEC = 10;\nconst HUB_WEIGHTS = {\n  uk: { eu: 0.50, us: 0.30, rest: 0.20 },\n  us: { us: 0.80, rest: 0.20 }, // 'eu' implicitly 0\n};\nconst HUB_COLOR = { uk: 0xB029FF, us: 0xF15B40 };\n\n// Pre-bucket destinations per (hub, region), respecting each city's `via`.\n// UK hub serves destinations with via 'uk' or 'both'; US hub serves\n// destinations with via 'us' or 'both'. This mirrors the real supported\n// destination lists for each hub — no city fires from a hub that doesn't\n// actually serve it.\nconst DEST_BUCKETS = {\n  uk: { us: [], eu: [], rest: [] },\n  us: { us: [], rest: [] },\n};\nDESTS.forEach(d => {\n  const ukOK = (d.via === 'uk' || d.via === 'both');\n  const usOK = (d.via === 'us' || d.via === 'both');\n  if (ukOK && DEST_BUCKETS.uk[d.region]) DEST_BUCKETS.uk[d.region].push(d);\n  if (usOK) {\n    if (d.region === 'us') DEST_BUCKETS.us.us.push(d);\n    else DEST_BUCKETS.us.rest.push(d);\n  }\n});\n\nfunction pickRegion(hubId) {\n  const w = HUB_WEIGHTS[hubId];\n  const r = Math.random();\n  let acc = 0;\n  for (const region in w) {\n    acc += w[region];\n    if (r < acc) return region;\n  }\n  // Fallback (rounding): return last key\n  return Object.keys(w).pop();\n}\nfunction pickDestination(hubId) {\n  const region = pickRegion(hubId);\n  const bucket = DEST_BUCKETS[hubId]?.[region];\n  if (!bucket || bucket.length === 0) {\n    // Bucket empty (shouldn't happen) — fall back to any reachable dest.\n    const all = Object.values(DEST_BUCKETS[hubId]).flat();\n    return all[Math.floor(Math.random() * all.length)];\n  }\n  return bucket[Math.floor(Math.random() * bucket.length)];\n}\n\nfunction firePayment(hubId) {\n  const hub = HUBS.find(h => h.id === hubId);\n  const dest = pickDestination(hubId);\n  if (!hub || !dest) return;\n  spawnPayment(hub, dest, HUB_COLOR[hubId]);\n}\n\n// ---------- COUNTRY-FOCUSED PAYMENTS ----------\n// While a country card is open, fire one extra payment per second targeting\n// a random city in that country. Picks a hub that actually serves it.\nlet activeCountry = null;\nlet countryPaymentTimer = null;\nfunction fireCountryPayment() {\n  if (!activeCountry) return;\n  const cities = DESTS.filter(d => d.country === activeCountry.name);\n  if (!cities.length) return;\n  const city = cities[Math.floor(Math.random() * cities.length)];\n  // Pick hub: prefer one of the hubs that actually serves this country.\n  const hubsServing = new Set();\n  (activeCountry.paymentMethods || []).forEach(pm =>\n    (pm.hubs || []).forEach(h => hubsServing.add(h)));\n  // Fall back to the city's own `via` field if country data is unavailable.\n  let hubId;\n  if (hubsServing.size === 0) {\n    hubId = city.via === 'us' ? 'us' : 'uk';\n  } else if (hubsServing.size === 1) {\n    hubId = [...hubsServing][0];\n  } else {\n    // Both hubs serve it — pick one at random per spawn.\n    hubId = Math.random() < 0.5 ? 'uk' : 'us';\n  }\n  const hub = HUBS.find(h => h.id === hubId);\n  if (!hub) return;\n  spawnPayment(hub, city, HUB_COLOR[hubId]);\n}\nfunction startCountryPayments(country) {\n  activeCountry = country;\n  if (countryPaymentTimer) clearInterval(countryPaymentTimer);\n  // Fire one immediately so the user sees instant feedback, then 1/sec.\n  fireCountryPayment();\n  countryPaymentTimer = setInterval(fireCountryPayment, 1000);\n}\nfunction stopCountryPayments() {\n  activeCountry = null;\n  if (countryPaymentTimer) { clearInterval(countryPaymentTimer); countryPaymentTimer = null; }\n}\n\n// Drive the spawn rate from rAF so it pauses when the tab is hidden.\nlet lastSpawn = performance.now();\nfunction spawnTick(now) {\n  const dt = (now - lastSpawn) / 1000;\n  // Expected spawns this frame per hub\n  const expected = dt * PAYMENTS_PER_SEC;\n  // Use Math.random() for fractional rates so we average exactly 10/s.\n  ['uk', 'us'].forEach(hubId => {\n    let n = Math.floor(expected);\n    if (Math.random() < (expected - n)) n++;\n    for (let i = 0; i < n; i++) firePayment(hubId);\n  });\n  lastSpawn = now;\n  requestAnimationFrame(spawnTick);\n}\nrequestAnimationFrame(spawnTick);\n\n// ---------- INTERACTION ----------\nlet isDragging = false;\n// Initial framing: lock the globe so both hubs are visible at once.\n// London is at lon≈0, New York at lon≈-74. Centering on the Atlantic\n// (≈37°W) puts both hubs comfortably in view on the front face.\n// Using the same formula spinTo() uses: rotation.y = -π/2 - (lon·π/180)\n// Initial framing: locked so both hubs frame symmetrically on the front face.\n// rotation.y = -0.9 rad centers ~35°W (mid-Atlantic) so London sits to the\n// right and New York to the left of center, both clearly visible.\nglobe.rotation.y = -0.9;\n// Expose for tooling / debugging\nwindow.__globe = globe;\nwindow.__globeTilt = globeTilt;\nwindow.__payments = payments;\nwindow.__HUBS = HUBS;\n\nlet prev = { x: 0, y: 0 };\nlet velocity = { x: 0, y: 0 };\nlet autoRotateSpeed = 0; // fixed view — only rotates on search via spinTo()\nlet userInteracting = false;\nlet userTimeout;\n\nfunction onPointerDown(e) {\n  isDragging = true;\n  userInteracting = true;\n  prev.x = e.clientX ?? e.touches?.[0]?.clientX ?? 0;\n  prev.y = e.clientY ?? e.touches?.[0]?.clientY ?? 0;\n  clearTimeout(userTimeout);\n}\nfunction onPointerMove(e) {\n  const cx = e.clientX ?? e.touches?.[0]?.clientX ?? 0;\n  const cy = e.clientY ?? e.touches?.[0]?.clientY ?? 0;\n  if (isDragging) {\n    const dx = (cx - prev.x) * 0.005;\n    const dy = (cy - prev.y) * 0.005;\n    // Horizontal drag spins around true vertical axis (pole stays up)\n    globe.rotation.y += dx;\n    // Vertical drag adjusts the viewing tilt only — never tilts the pole\n    globeTilt.rotation.x = THREE.MathUtils.clamp(globeTilt.rotation.x + dy, -0.6, 0.9);\n    velocity.x = dx;\n    velocity.y = dy;\n    prev.x = cx; prev.y = cy;\n  }\n  // Lat/lon readout from pointer relative to globe rotation (rough)\n  // Project a screen point near the cursor onto the sphere for a real readout\n  const rect = canvas.getBoundingClientRect();\n  const mx = ((cx - rect.left) / rect.width) * 2 - 1;\n  const my = -((cy - rect.top) / rect.height) * 2 + 1;\n  raycaster.setFromCamera({ x: mx, y: my }, camera);\n  const hit = raycaster.intersectObject(sphere)[0];\n  if (hit) {\n    // Convert hit point (world) into globe-local then to lat/lon\n    const local = globe.worldToLocal(hit.point.clone());\n    const lat = 90 - (Math.acos(local.y / RADIUS) * 180 / Math.PI);\n    const lon = Math.atan2(-local.z, local.x) * 180 / Math.PI;\n    document.getElementById('lat-readout').textContent = `${lat>=0?'+':'−'} ${Math.abs(lat).toFixed(2)}°`;\n    document.getElementById('lon-readout').textContent = `${lon>=0?'+':'−'} ${Math.abs(lon).toFixed(2)}°`;\n  }\n}\nfunction onPointerUp() {\n  isDragging = false;\n  clearTimeout(userTimeout);\n  userTimeout = setTimeout(() => { userInteracting = false; velocity.x *= 0.5; }, 2200);\n}\n\ncanvas.addEventListener('mousedown', onPointerDown);\nwindow.addEventListener('mousemove', onPointerMove);\nwindow.addEventListener('mouseup', onPointerUp);\ncanvas.addEventListener('touchstart', onPointerDown, { passive: true });\ncanvas.addEventListener('touchmove', onPointerMove, { passive: true });\ncanvas.addEventListener('touchend', onPointerUp);\n\n// Hub tooltip via raycaster\nconst raycaster = new THREE.Raycaster();\nraycaster.params.Line = { threshold: 0.05 };\nlet hoveredCountryName = null;\nlet modalOpenedByHover = false;\nlet modalOpenedByClick = false;\nconst tooltip = document.getElementById('hub-tooltip');\nconst tTag = document.getElementById('t-tag');\nconst tName = document.getElementById('t-name');\nconst tMeta = document.getElementById('t-meta');\n\ncanvas.addEventListener('click', (e) => {\n  const rect = canvas.getBoundingClientRect();\n  const mx = ((e.clientX - rect.left) / rect.width) * 2 - 1;\n  const my = -((e.clientY - rect.top) / rect.height) * 2 + 1;\n  raycaster.setFromCamera({ x: mx, y: my }, camera);\n  // Only country dots are clickable. City destination dots are decorative.\n  const hits = raycaster.intersectObjects(extraCountryMeshes, false);\n  if (hits.length) {\n    const c = hits[0].object.userData?.country;\n    if (c) openCountry(c, { fromClick: true });\n  }\n});\n\ncanvas.addEventListener('mousemove', (e) => {\n  // Suppress hover effects while the user is dragging the globe.\n  if (isDragging) {\n    tooltip.classList.remove('show');\n    canvas.style.cursor = 'grabbing';\n    return;\n  }\n  const rect = canvas.getBoundingClientRect();\n  const mx = ((e.clientX - rect.left) / rect.width) * 2 - 1;\n  const my = -((e.clientY - rect.top) / rect.height) * 2 + 1;\n  raycaster.setFromCamera({ x: mx, y: my }, camera);\n  // Country dot: cursor feedback only — actual open happens on click.\n  const countryHits = raycaster.intersectObjects(extraCountryMeshes, false);\n  if (countryHits.length) {\n    canvas.style.cursor = 'pointer';\n    tooltip.classList.remove('show');\n    return;\n  }\n  const hits = raycaster.intersectObjects(hubMeshes, true);\n  if (hits.length) {\n    const grp = hits[0].object.parent || hits[0].object;\n    const hub = grp.userData?.hub || grp.parent?.userData?.hub;\n    if (hub) {\n      tooltip.classList.add('show');\n      tooltip.style.left = (e.clientX - rect.left) + 'px';\n      tooltip.style.top = (e.clientY - rect.top) + 'px';\n      tTag.textContent = hub.id === 'uk' ? 'UK · FCA REGULATED HUB' : 'US · NYDFS REGULATED HUB';\n      tTag.className = 'tooltip-tag ' + hub.id;\n      tName.textContent = hub.entity;\n      tMeta.innerHTML = `\n        <span>City<\u002Fspan><b>${hub.city}<\u002Fb>\n        <span>Regulator<\u002Fspan><b>${hub.regulator}<\u002Fb>\n        <span>Currencies<\u002Fspan><b>${ n\n  if (scored.length === 0) {\n    suggestBox.innerHTML = `\n      <div class=\"suggest-empty\">No direct match — opening SWIFT correspondent view…<\u002Fdiv>\n    `;\n    searchShell.classList.add('has-results');\n    currentSuggestions = [];\n    return;\n  }\n\n  // Group by kind (only countries are indexed now)\n  const byKind = { country: [] };\n  scored.forEach(s => { if (byKind[s.it.kind]) byKind[s.it.kind].push(s.it); });\n  const sections = [];\n  if (byKind.country.length)  sections.push(['Countries', byKind.country]);\n\n  let html = '';\n  let idx = 0;\n  currentSuggestions = [];\n  for (const [head, list] of sections) {\n    html += `<div class=\"suggest-section\"><div class=\"suggest-head\">${head}<\u002Fdiv>`;\n    for (const it of list) {\n      html += `<div class=\"suggest-row\" data-i=\"${idx}\" data-kind=\"${it.kind}\" data-id=\"${encodeURIComponent(it.id)}\">\n        <span class=\"suggest-name\">${highlightMatch(it.label, query)}<\u002Fspan>\n        <span class=\"suggest-meta\">${it.sub}<\u002Fspan>\n      <\u002Fdiv>`;\n      currentSuggestions.push(it);\n      idx++;\n    }\n    html += `<\u002Fdiv>`;\n  }\n  suggestBox.innerHTML = html;\n  searchShell.classList.add('has-results');\n  activeSuggest = 0;\n  paintActiveSuggestion();\n}\n\nfunction paintActiveSuggestion() {\n  suggestBox.querySelectorAll('.suggest-row').forEach(r => r.classList.remove('active'));\n  const el = suggestBox.querySelector(`.suggest-row[data-i=\"${activeSuggest}\"]`);\n  if (el) el.classList.add('active');\n}\n\nsearchInput.addEventListener('input', e => runSearch(e.target.value));\nsearchInput.addEventListener('focus', () => { if (searchInput.value) runSearch(searchInput.value); });\nsearchInput.addEventListener('keydown', (e) => {\n  if (e.key === 'ArrowDown') { e.preventDefault(); activeSuggest = Math.min(activeSuggest+1, currentSuggestions.length-1); paintActiveSuggestion(); }\n  else if (e.key === 'ArrowUp') { e.preventDefault(); activeSuggest = Math.max(activeSuggest-1, 0); paintActiveSuggestion(); }\n  else if (e.key === 'Enter') {\n    e.preventDefault();\n    if (currentSuggestions.length && activeSuggest >= 0) {\n      pickSuggestion(currentSuggestions[activeSuggest]);\n    } else if (searchInput.value.trim()) {\n      // Open SWIFT fallback for unrecognised query\n      openFallback(searchInput.value.trim());\n    }\n  } else if (e.key === 'Escape') {\n    searchInput.blur();\n    searchShell.classList.remove('has-results');\n  }\n});\n\nsuggestBox.addEventListener('click', (e) => {\n  const row = e.target.closest('.suggest-row');\n  if (!row) return;\n  const i = +row.dataset.i;\n  if (currentSuggestions[i]) pickSuggestion(currentSuggestions[i]);\n});\n\ndocument.addEventListener('click', (e) => {\n  if (!searchShell.contains(e.target)) searchShell.classList.remove('has-results');\n});\n\n// Global \"/\" shortcut\ndocument.addEventListener('keydown', (e) => {\n  if (e.key === '/' && document.activeElement !== searchInput && !modal.classList.contains('show')) {\n    e.preventDefault();\n    searchInput.focus();\n    searchInput.select();\n  }\n  if (e.key === 'Escape' && modal.classList.contains('show')) closeModal();\n});\n\nfunction pickSuggestion(it) {\n  searchShell.classList.remove('has-results');\n  searchInput.blur();\n  if (it.kind === 'country') openCountry(it.data);\n}\n\n// ---- modal helpers ----\nfunction showModal(opts = {}) {\n  modal.classList.add('show');\n  if (!opts.silent) modalBackdrop.classList.add('show');\n  modal.setAttribute('aria-hidden', 'false');\n}\nfunction closeModal() {\n  const wasHover = modalOpenedByHover;\n  const wasClick = modalOpenedByClick;\n  modal.classList.remove('show');\n  modalBackdrop.classList.remove('show');\n  modal.setAttribute('aria-hidden', 'true');\n  // Reset highlight ring\n  destMeshes.forEach(m => { m.userData.highlight = false; m.scale.setScalar(1); });\n  // Stop the country-focused payment burst.\n  stopCountryPayments();\n  // Only spin/tilt back if the user explicitly opened via SEARCH.\n  // Hover-opened or click-on-globe-opened cards leave the globe where it is.\n  if (!wasHover && !wasClick) resetView();\n  modalOpenedByHover = false;\n  modalOpenedByClick = false;\n  // Always clear the search input so the next interaction starts fresh.\n  searchInput.value = '';\n  searchShell.classList.remove('has-results');\n  suggestBox.innerHTML = '';\n  currentSuggestions = [];\n}\nmodalClose.addEventListener('click', closeModal);\nmodalBackdrop.addEventListener('click', closeModal);\n\n// ---- country view ----\nfunction methodChipHtml(pm) {\n  const type = pm.type;\n  if (type === 'Domestic Bank Transfer' && pm.schemes && pm.schemes.length) {\n    return `<span class=\"chip payout\">${type} <span class=\"chip-sub\">(${pm.schemes.join(', ')})<\u002Fspan><\u002Fspan>`;\n  }\n  return `<span class=\"chip payout\">${type}<\u002Fspan>`;\n}\n\nfunction hubColumn(label, hubId, methods) {\n  const cls = `hub-card ${hubId}${methods.length ? '' : ' dim'}`;\n  const body = methods.length\n    ? `<div class=\"chip-list\">${methods.map(methodChipHtml).join('')}<\u002Fdiv>`\n    : `<div class=\"hub-card-na\">Not served from this hub<\u002Fdiv>`;\n  return `<div class=\"${cls}\">\n    <div class=\"hub-card-title\">${label}<\u002Fdiv>\n    <div style=\"margin-top:12px\"><\u002Fdiv>\n    ${body}\n  <\u002Fdiv>`;\n}\n\nfunction openCountry(c, opts = {}) {\n  modalTag.textContent = 'DESTINATION COVERAGE';  modalTitle.innerHTML = `${c.name} <span class=\"iso\">${c.iso2} · ${c.iso3}<\u002Fspan>`;\n  modalSub.textContent = `Local currency · ${c.ccy} · ${c.region}`;\n  modalBody.innerHTML = `\n    <div class=\"hub-grid\">\n      ${hubColumn('UK Hub · London', 'uk', c.ukMethods || [])}\n      ${hubColumn('US Hub · New York', 'us', c.usMethods || [])}\n    <\u002Fdiv>\n  `;\n  // Capture pre-open state so we can decide hover vs explicit ownership.\n  const wasShowing = modal.classList.contains('show');\n  showModal(opts);\n  if (opts.silent) {\n    // Silent (hover) open: only claim hover-ownership if nothing else\n    // already opened the modal. Don't downgrade a click/search open.\n    if (!wasShowing) modalOpenedByHover = true;\n  } else {\n    // Explicit open. Track click-on-globe vs search separately so we know\n    // whether to return the globe to base on close (only do so on search).\n    modalOpenedByHover = false;\n    modalOpenedByClick = !!opts.fromClick;\n  }\n  if (!opts.silent) {\n    spinTo(c.lat, c.lon);\n    pulseDestinationAt(c.lat, c.lon);\n  }\n  // Boost activity to this country: 1 extra payment/sec while card is open.\n  startCountryPayments(c);\n}\n\n// ---- currency view ----\n\nfunction openCurrency(cc) {\n  modalTag.textContent = 'CURRENCY COVERAGE';\n  modalTitle.innerHTML = `${cc.code} <span class=\"iso\">Currency<\u002Fspan>`;\n  modalSub.textContent = `${cc.countries.length} destination${cc.countries.length===1?'':'s'} payable in ${cc.code}`;\n  modalBody.innerHTML = `\n    <div class=\"hub-grid single\">\n      <div class=\"hub-card uk\">\n        <div class=\"hub-card-title\">Destinations<\u002Fdiv>\n        <div style=\"margin-top:12px\"><\u002Fdiv>\n        <div class=\"dest-list open\" style=\"display:flex\">\n          ${cc.countries.map(n => `<span data-country=\"${n}\">${n}<\u002Fspan>`).join('')}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  modalBody.querySelector('.dest-list').addEventListener('click', (e) => {\n    const span = e.target.closest('span[data-country]');\n    if (!span) return;\n    const c = VData.countries[span.dataset.country];\n    if (c) openCountry(c);\n  });\n  showModal();\n  if (cc.countries.length) {\n    const first = VData.countries[cc.countries[0]];\n    if (first) { spinTo(first.lat, first.lon); pulseDestinationAt(first.lat, first.lon); }\n  }\n}\n\n// ---- scheme view (lightweight) ----\nfunction openScheme(s) {\n  modalTag.textContent = 'PAYMENT SCHEME';\n  modalTitle.innerHTML = s.name;\n  modalSub.textContent = `${s.countries.length} countr${s.countries.length===1?'y':'ies'} use this rail`;\n  modalBody.innerHTML = `\n    <div class=\"why-block\">\n      <span class=\"label\">Coverage<\u002Fspan>\n      ${s.name} is a local payment scheme available in the destinations below. Vitesse routes payments to the relevant country's hub and clears via this scheme where supported.\n    <\u002Fdiv>\n    <div class=\"dest-list open\" style=\"display:block;margin-top:18px\">\n      ${s.countries.map(n => `<span data-country=\"${n}\">${n}<\u002Fspan>`).join('')}\n    <\u002Fdiv>\n  `;\n  modalBody.querySelector('.dest-list').addEventListener('click', (e) => {\n    const span = e.target.closest('span[data-country]');\n    if (!span) return;\n    const c = VData.countries[span.dataset.country];\n    if (c) openCountry(c);\n  });\n  showModal();\n}\n\n// ---- SWIFT fallback ----\nfunction openFallback(query) {\n  searchShell.classList.remove('has-results');\n  modalTag.textContent = 'NO DIRECT MATCH';\n  modalTitle.innerHTML = `${query}`;\n  modalSub.textContent = 'Routed via SWIFT correspondent';\n  modalBody.innerHTML = `\n    <div class=\"fallback-block\">\n      <h4>Routed via SWIFT correspondent<\u002Fh4>\n      <p>“${query}” is not on a Vitesse direct local rail. Payments to this destination are cleared via SWIFT through one of our regulated hubs — typically the UK Hub for cross-border SWIFT coverage. Speak to us for cut-off times and indicative SLAs.<\u002Fp>\n    <\u002Fdiv>\n  `;\n  showModal();\n}\n\n// ---- Pulse a destination on the globe ----\n// Briefly enlarges the marker nearest (lat,lon) and adds a halo ring.\nlet pulseHalo = null;\nfunction pulseDestinationAt(lat, lon) {\n  // Find nearest destination marker; if none within tolerance, draw a transient marker\n  const target = latLonToVec3(lat, lon, RADIUS * 1.005);\n  let nearest = null, bestD = Infinity;\n  destMeshes.forEach(m => {\n    const d = m.position.distanceTo(target);\n    if (d < bestD) { bestD = d; nearest = m; }\n  });\n  // tolerance ~15° of arc (~0.5 units on R=2 sphere)\n  const useExisting = nearest && bestD < 0.5;\n\n  // Remove old halo\n  if (pulseHalo) {\n    globe.remove(pulseHalo); pulseHalo.geometry.dispose(); pulseHalo.material.dispose(); pulseHalo = null;\n  }\n  // New halo at the right spot\n  const haloGeo = new THREE.RingGeometry(0.02, 0.06, 32);\n  const haloMat = new THREE.MeshBasicMaterial({ color: 0xF15B40, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });\n  const halo = new THREE.Mesh(haloGeo, haloMat);\n  const haloPos = useExisting ? nearest.position.clone() : target;\n  halo.position.copy(haloPos);\n  halo.lookAt(haloPos.clone().multiplyScalar(2));\n  halo.userData.born = performance.now();\n  halo.userData.life = 2400;\n  globe.add(halo);\n  pulseHalo = halo;\n\n  if (useExisting) {\n    // Bounce the marker briefly via a simple scale-tween\n    const m = nearest;\n    const t0 = performance.now();\n    function bounce(now) {\n      const t = (now - t0) / 700;\n      if (t > 1) { m.scale.setScalar(1); return; }\n      const k = Math.sin(t * Math.PI);\n      m.scale.setScalar(1 + k * 1.4);\n      requestAnimationFrame(bounce);\n    }\n    requestAnimationFrame(bounce);\n  }\n}\n\n// Hook into render loop: animate halo\nconst _origTickerInterval = setInterval; // (no-op, just to keep linters happy)\n(function animateHalo(){\n  function step() {\n    if (pulseHalo) {\n      const age = performance.now() - pulseHalo.userData.born;\n      const k = age / pulseHalo.userData.life;\n      if (k >= 1) {\n        globe.remove(pulseHalo); pulseHalo.geometry.dispose(); pulseHalo.material.dispose(); pulseHalo = null;\n      } else {\n        pulseHalo.scale.setScalar(1 + k * 5);\n        pulseHalo.material.opacity = 0.9 * (1 - k);\n      }\n    }\n    requestAnimationFrame(step);\n  }\n  requestAnimationFrame(step);\n})();\n\n// ---------- RESIZE ----------\nfunction resize() {\n  const rect = canvas.getBoundingClientRect();\n  const w = rect.width, h = rect.height;\n  renderer.setSize(w, h, false);\n  camera.aspect = w / h;\n  camera.updateProjectionMatrix();\n}\nnew ResizeObserver(resize).observe(canvas);\nresize();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
